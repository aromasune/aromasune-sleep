    function t(key) {
      return (translations[currentLang] && translations[currentLang][key]) || translations.en[key];
    }

    function escapeAttr(s) {
      return String(s).replace(/"/g, "&quot;");
    }

    function renderLangBar() {
      const langs = [
        { code: "en", name: translations.en.langName },
        { code: "zh", name: translations.zh.langName },
        { code: "ms", name: translations.ms.langName },
        { code: "id", name: translations.id.langName }
      ];

      const bar = document.getElementById("langBar");
      bar.innerHTML = langs.map(l =>
        `<button class="lang-btn ${currentLang === l.code ? "active" : ""}" data-lang="${l.code}">${l.name}</button>`
      ).join("");

      bar.querySelectorAll("button.lang-btn").forEach(btn => {
        btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
      });
    }

    function renderPage() {
      // Set html lang
      document.documentElement.lang =
        currentLang === "zh" ? "zh-CN" :
        currentLang === "ms" ? "ms" :
        currentLang === "id" ? "id" : "en";

      // ① Hero
      document.getElementById("heroTitle").innerHTML = t("heroTitle");
      document.getElementById("heroSub").innerHTML = t("heroSub");

      const heroBtns = translations[currentLang].heroBtns || translations.en.heroBtns;
      document.getElementById("heroButtons").innerHTML = heroBtns.map(b => {
        const cls = b.type === "primary" ? "btn btn-primary" : "btn btn-outline";
        return `<a class="${cls}" href="${escapeAttr(b.href)}">${b.label}</a>`;
      }).join("");

      const badges = translations[currentLang].badges || translations.en.badges;
      document.getElementById("badgeContainer").innerHTML = badges
        .map(b => `<span class="badge">${b}</span>`).join("");

      // Guardrails
      const guardrails = translations[currentLang].guardrails || translations.en.guardrails;
      document.getElementById("guardrails").innerHTML = guardrails
        .map(x => `<div class="trust-item">${x}</div>`).join("");

      // ② What you'll get
      document.getElementById("wyGetTitle").innerText = t("wyGetTitle");
      document.getElementById("wyGetLead").innerText = translations[currentLang].wyGetLead || translations.en.wyGetLead;

      const cards = translations[currentLang].wyGetCards || translations.en.wyGetCards;
      document.getElementById("wyGetCards").innerHTML = cards.map(c => `
        <div class="card">
          <h3>${c.title}</h3>
          <p>${c.desc}</p>
        </div>
      `).join("");
      document.getElementById("wyGetCards").parentElement.id = "what-you-get";

      // ③ Why sleep matters
      document.getElementById("whySleepTitle").innerText = t("whySleepTitle");
      document.getElementById("whySleepLead").innerHTML = t("whySleepLead");

      const chain = translations[currentLang].chain || translations.en.chain;
      document.getElementById("sleepChain").innerHTML = chain.map(x => {
        if (x === "↓") return `<div class="arrow">↓</div>`;
        return `<div>${x}</div>`;
      }).join("");

      // ④ Why signals
      document.getElementById("whySignalsTitle").innerText = t("whySignalsTitle");
      document.getElementById("whySignalsLead").innerHTML = t("whySignalsLead");

      // ⑤ About
      document.getElementById("aboutTitle").innerText = t("aboutTitle");
      document.getElementById("aboutCard").innerHTML = t("aboutHtml");

      // ⑥ Credentials
      document.getElementById("credTitle").innerText = t("credTitle");

      const pillars = translations[currentLang].pillars || translations.en.pillars;
      document.getElementById("deliveryPillars").innerHTML = pillars
        .map(p => `<div class="trust-item">${p}</div>`).join("");

      document.getElementById("credCard").innerHTML = t("credHtml");

      // ⑦ Final CTA
      document.getElementById("finalCta").innerHTML = t("finalCtaHtml");

      // Contact / Footer
      document.getElementById("contactBlock").innerHTML = t("contactHtml");
      document.getElementById("footerBlock").innerHTML = t("footerHtml");

      // Modal strings
      document.getElementById("modalTitle").innerText = t("modalTitle");
      document.getElementById("modalBody").innerHTML = t("modalBody");

      bindPrivacyLink();
    }

    function setLanguage(lang) {
      currentLang = lang;
      renderLangBar();
      renderPage();
    }

    function openModal() {
      const modal = document.getElementById("privacyModal");
      modal.style.display = "flex";
      modal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      const modal = document.getElementById("privacyModal");
      modal.style.display = "none";
      modal.setAttribute("aria-hidden", "true");
    }

    function bindPrivacyLink() {
      const privacyLink = document.getElementById("privacyPolicyLink");
      if (privacyLink) {
        privacyLink.onclick = (e) => {
          e.preventDefault();
          openModal();
        };
      }
    }

    window.onload = () => {
      renderLangBar();
      renderPage();

      const closeSpan = document.querySelector(".close-modal");
      if (closeSpan) closeSpan.onclick = closeModal;

      const modal = document.getElementById("privacyModal");

      window.onclick = (event) => {
        if (event.target === modal) closeModal();
      };

      window.onkeydown = (event) => {
        if (event.key === "Escape") closeModal();
      };
    };
  </script>
