      border-bottom: 1px solid #d4c5b0;

    function t(key, sectionIdx = null, isTitle = false) {
      if (sectionIdx !== null) {
        const sec = (translations[currentLang]?.sections || translations.en.sections)[sectionIdx];
        return isTitle ? (sec?.title || "") : (sec?.content || "");
      }
      return translations[currentLang]?.[key] || translations.en[key] || "";
    }

    function renderContent() {
      const container = document.getElementById("content");
      const sections = translations[currentLang]?.sections || translations.en.sections;

      let html = "";
      for (let i = 0; i < sections.length; i++) {
        html += `<h2>${t(null, i, true)}</h2>`;
        html += `<p>${t(null, i, false)}</p>`;
      }
      html += `<div class="disclaimer">${t("disclaimer")}</div>`;
      container.innerHTML = html;
    }

    function applyLanguage() {
      document.getElementById("title").innerText = t("title");
      document.getElementById("subhead").innerText = t("subhead");
      document.getElementById("footerNote").innerHTML = t("footer");
      document.title = translations[currentLang]?.pageTitle || translations.en.pageTitle;

      renderContent();

      document.documentElement.lang =
        currentLang === "zh" ? "zh-CN" :
        currentLang === "ms" ? "ms" :
        currentLang === "id" ? "id" : "en";
    }

    function setLanguage(lang) {
      currentLang = lang;
      applyLanguage();
      document.querySelectorAll(".lang-btn")
        .forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
    }

    function renderLangBar() {
      const langs = [
        { code: "en", name: "English" },
        { code: "zh", name: "中文" },
        { code: "ms", name: "Melayu" },
        { code: "id", name: "Indonesia" }
      ];
      const bar = document.getElementById("langBar");
      bar.innerHTML = langs
        .map(l =>
          `<button class="lang-btn ${currentLang === l.code ? "active" : ""}"
            data-lang="${l.code}"
            onclick="setLanguage('${l.code}')">${l.name}</button>`
        )
        .join("");
    }

    window.onload = () => {
      renderLangBar();
      applyLanguage();
    };
  </script>
</body>
