<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sleep Health Guide · AROMA SUNÉ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #fefef7;
      color: #2c3e2f;
      line-height: 1.5;
      padding: 2rem 1.5rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #e9ede4;
    }
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .lang-btn {
      background: none;
      border: 1px solid #d4c5b0;
      padding: 4px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
    }
    .lang-btn.active {
      background: #b99470;
      border-color: #b99470;
      color: white;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      color: #3c5e30;
      margin-bottom: 0.5rem;
    }
    .subhead {
      color: #6b7c5e;
      border-left: 3px solid #b99470;
      padding-left: 12px;
      margin: 12px 0 24px;
      font-size: 0.9rem;
    }
    h2 {
      font-size: 1.3rem;
      font-weight: 500;
      color: #4a6a3b;
      margin: 1.5rem 0 0.8rem 0;
    }
    p, li {
      color: #5a6b52;
      margin-bottom: 0.8rem;
    }
    ul {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .disclaimer {
      background: #f9f3ec;
      padding: 1rem;
      border-radius: 20px;
      margin: 1.5rem 0;
      font-size: 0.8rem;
      border: 1px solid #e2e8da;
      color: #b85c00;
    }
    hr {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid #e2e8da;
    }
    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 2rem;
      color: #8b9a7a;
    }
    a {
      color: #4a6a3b;
      text-decoration: none;
      border-bottom: 1px solid #d4c5b0;
    }
    a:hover { color: #2c4a2a; }
  </style>
</head>

<body>
  <div class="container">
    <div class="lang-bar" id="langBar"></div>

    <h1 id="title">Sleep Health Guide</h1>
    <div class="subhead" id="subhead">gentle, non-pharmaceutical suggestions · not medical advice</div>

    <div id="content">
      <!-- Content injected by JavaScript -->
    </div>

    <div class="footer-note" id="footerNote">AROMA SUNÉ · quietly part of WTA · WSS · WITT AP</div>
  </div>

  <script>
    let currentLang = "en";  // Default English

    const translations = {
      en: {
        title: "Sleep Health Guide",
        subhead: "gentle, non-pharmaceutical suggestions · not medical advice",
        sections: [
          {
            title: "🌙 Understanding Sleep in Menopause Transition",
            content: "Hormonal changes during perimenopause and menopause can affect sleep. Common patterns include: difficulty falling asleep, waking up between 3-5 AM, trouble falling back asleep, night sweats interrupting rest, and feeling tired during the day. These are normal experiences — small adjustments can help."
          },
          {
            title: "🕯️ Gentle Evening Rituals",
            content: "<strong>Dim the lights 1-2 hours before bed</strong> — avoid bright screens (phones, laptops).<br><strong>Create a wind-down routine</strong> — light stretching, reading (physical book), or listening to calm music.<br><strong>Keep your bedroom cool</strong> — around 18-22°C (65-72°F) is ideal, especially if you experience night sweats.<br><strong>Use breathable bedding</strong> — cotton or bamboo fabrics help regulate temperature."
          },
          {
            title: "😴 If You Wake Up at 3-5 AM",
            content: "This is common during menopausal transition. Instead of watching the clock: <strong>Stay in bed, keep lights off</strong> — avoid checking your phone. <strong>Try gentle breathing</strong> — inhale for 4 counts, hold for 4, exhale for 6. <strong>Progressive muscle relaxation</strong> — tense and release each muscle group from toes to head. <strong>If you can't fall back asleep after 20 minutes</strong> — get up, sit in a dimly lit room, read or listen to something calm, then return to bed when you feel sleepy."
          },
          {
            title: "🌿 Non-Pharmaceutical Support Options",
            content: "<strong>Acupressure points</strong> — gently massage 'Shen Men' (ear) or 'Yin Tang' (between eyebrows) before sleep.<br><strong>Aromatherapy</strong> — lavender, bergamot, or clary sage (use diluted, never ingest).<br><strong>Emotional release audio</strong> — we offer three free audio guides for post-argument, parenting pressure, and aging anxiety.<br><strong>Consistent wake time</strong> — waking at the same time daily (even on weekends) helps regulate your internal clock."
          },
          {
            title: "📋 When to Talk to a Doctor",
            content: "While these gentle strategies help many people, please consult a clinician if: you regularly sleep less than 5 hours per night; you wake up gasping or choking; your partner notices you stop breathing during sleep; daytime sleepiness interferes with driving or work; you feel persistently hopeless or anxious about sleep. This guide is not a substitute for medical advice."
          }
        ],
        disclaimer: "⚠️ This guide is for educational purposes only. It does not constitute medical advice, diagnosis, or treatment. Always consult a qualified healthcare provider for your specific situation.",
        footer: "AROMA SUNÉ · quietly part of WTA · WSS · WITT AP"
      },

      zh: {
        title: "睡眠健康指南",
        subhead: "温和的非药物建议 · 非医疗建议",
        sections: [
          {
            title: "🌙 理解围绝经期的睡眠变化",
            content: "围绝经期和更年期的激素变化会影响睡眠。常见模式包括：入睡困难、凌晨3-5点醒来、醒后难以再次入睡、潮热打断睡眠、白天感到疲劳。这些都是正常经历——小调整可以有所帮助。"
          },
          {
            title: "🕯️ 温和的睡前仪式",
            content: "<strong>睡前1-2小时调暗灯光</strong> — 避免明亮的屏幕（手机、电脑）。<br><strong>建立放松程序</strong> — 轻微拉伸、阅读（纸质书）、或听平静的音乐。<br><strong>保持卧室凉爽</strong> — 约18-22°C（65-72°F）是理想的，尤其如果您有潮热。<br><strong>使用透气的床品</strong> — 棉质或竹纤维面料有助于调节温度。"
          },
          {
            title: "😴 如果在凌晨3-5点醒来",
            content: "这在更年期过渡期很常见。不要看时钟：<strong>留在床上，保持关灯</strong> — 避免查看手机。<strong>尝试温和呼吸</strong> — 吸气4秒，屏息4秒，呼气6秒。<strong>渐进式肌肉放松</strong> — 从脚趾到头部逐一紧张再放松每个肌群。<strong>如果20分钟后仍无法入睡</strong> — 起床，坐在光线昏暗的房间里，阅读或听些平静的内容，感到困倦时再回床上。"
          },
          {
            title: "🌿 非药物支持选项",
            content: "<strong>穴位按压</strong> — 睡前轻柔按摩「神门」（耳部）或「印堂」（两眉之间）。<br><strong>芳香疗法</strong> — 薰衣草、佛手柑或快乐鼠尾草（稀释使用，切勿内服）。<br><strong>情绪释放音频</strong> — 我们提供三段免费音频：争吵后、育儿压力、衰老焦虑。<br><strong>固定的起床时间</strong> — 每天在同一时间起床（包括周末）有助于调节生物钟。"
          },
          {
            title: "📋 何时应咨询医生",
            content: "虽然这些温和的策略对许多人有所帮助，但如果出现以下情况，请咨询临床医生：您每晚经常睡眠少于5小时；您在睡眠中醒来时喘不过气或被呛到；您的伴侣注意到您睡眠中呼吸暂停；白天的困倦干扰了驾驶或工作；您对睡眠感到持续的绝望或焦虑。本指南不能替代医疗建议。"
          }
        ],
        disclaimer: "⚠️ 本指南仅供教育参考。不构成医疗建议、诊断或治疗。请针对您的具体情况咨询合格的医疗保健提供者。",
        footer: "AROMA SUNÉ · 安静地 part of WTA · WSS · WITT AP"
      }
    };

    // Malay & Indonesian fallback to English
    translations["ms"] = translations["en"];
    translations["id"] = translations["en"];

    function t(key, sectionIdx = null, isTitle = false) {
      if (sectionIdx !== null) {
        if (isTitle) return translations[currentLang]?.sections?.[sectionIdx]?.title || '';
        return translations[currentLang]?.sections?.[sectionIdx]?.content || '';
      }
      return translations[currentLang]?.[key] || translations.en[key] || '';
    }

    function renderContent() {
      const container = document.getElementById('content');
      const sections = translations[currentLang]?.sections || translations.en.sections;
      let html = '';
      for (let i = 0; i < sections.length; i++) {
        html += `<h2>${t(null, i, true)}</h2>`;
        html += `<p>${t(null, i, false)}</p>`;
      }
      html += `<div class="disclaimer">${t('disclaimer')}</div>`;
      container.innerHTML = html;
    }

    function applyLanguage() {
      document.getElementById('title').innerText = t('title');
      document.getElementById('subhead').innerText = t('subhead');
      document.getElementById('footerNote').innerHTML = t('footer');
      renderContent();
      // Update html lang attribute
      document.documentElement.lang =
        currentLang === 'zh' ? 'zh-CN' :
        currentLang === 'ms' ? 'ms' :
        currentLang === 'id' ? 'id' : 'en';
    }

    function setLanguage(lang) {
      currentLang = lang;
      applyLanguage();
      document.querySelectorAll('.lang-btn')
        .forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }

    function renderLangBar() {
      const langs = [
        { code: 'en', name: 'English' },
        { code: 'zh', name: '中文' },
        { code: 'ms', name: 'Melayu' },
        { code: 'id', name: 'Indonesia' }
      ];
      const bar = document.getElementById('langBar');
      bar.innerHTML = langs
        .map(l => `<button class="lang-btn ${currentLang === l.code ? 'active' : ''}" data-lang="${l.code}" onclick="setLanguage('${l.code}')">${l.name}</button>`)
        .join('');
    }

    window.onload = () => {
      renderLangBar();
      applyLanguage();
    };
  </script>
</body>
</html>
