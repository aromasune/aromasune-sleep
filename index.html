        return baseQuestions.map(q => {

    // --------------------------------------------------------------
    // 工具函数：SHA-256 哈希
    // --------------------------------------------------------------
    async function sha256(message) {
        const encoder = new TextEncoder();
        const data = encoder.encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --------------------------------------------------------------
    // 积分存储 (基于手机号哈希)
    // --------------------------------------------------------------
    const STORAGE_KEY = 'aromasune_points_data';
    const COMPLETED_KEY_PREFIX = 'completed_';
    const EXCHANGE_HISTORY_PREFIX = 'exchange_';

    function getUserPoints(phoneHash) {
        if (!phoneHash) return 0;
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        return data[phoneHash] || 0;
    }
    function setUserPoints(phoneHash, points) {
        if (!phoneHash) return;
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        data[phoneHash] = points;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }
    function addPoints(phoneHash, amount) {
        let current = getUserPoints(phoneHash);
        setUserPoints(phoneHash, current + amount);
        return current + amount;
    }
    function deductPoints(phoneHash, amount) {
        let current = getUserPoints(phoneHash);
        if (current >= amount) {
            setUserPoints(phoneHash, current - amount);
            return true;
        }
        return false;
    }
    function hasCompletedSurvey(phoneHash) {
        return localStorage.getItem(COMPLETED_KEY_PREFIX + phoneHash) === 'true';
    }
    function markCompletedSurvey(phoneHash) {
        localStorage.setItem(COMPLETED_KEY_PREFIX + phoneHash, 'true');
    }
    function addExchangeRecord(phoneHash, productName, points) {
        let key = EXCHANGE_HISTORY_PREFIX + phoneHash;
        let history = JSON.parse(localStorage.getItem(key) || '[]');
        history.push({ product: productName, points: points, time: new Date().toISOString() });
        localStorage.setItem(key, JSON.stringify(history));
    }
    function getExchangeHistory(phoneHash) {
        let key = EXCHANGE_HISTORY_PREFIX + phoneHash;
        return JSON.parse(localStorage.getItem(key) || '[]');
    }

    // --------------------------------------------------------------
    // 真实计分函数
    // --------------------------------------------------------------
    function computePSQI(responses) {
        // 成分1: 主观睡眠质量 (由问题? 本问卷未直接问，默认取1分，简化)
        let comp1 = 1;
        // 成分2: 入睡潜伏期 (q_latency_min)
        let latencyMin = parseInt(responses.q_latency_min) || 0;
        let comp2 = 0;
        if (latencyMin <= 15) comp2 = 0;
        else if (latencyMin <= 30) comp2 = 1;
        else if (latencyMin <= 60) comp2 = 2;
        else comp2 = 3;
        // 成分3: 睡眠时长 (小时)
        let sleepHours = parseFloat(responses.q_sleep_hours) || 0;
        let comp3 = 0;
        if (sleepHours >= 7) comp3 = 0;
        else if (sleepHours >= 6) comp3 = 1;
        else if (sleepHours >= 5) comp3 = 2;
        else comp3 = 3;
        // 成分4: 睡眠效率 (基于上床时间、起床时间、睡眠时长)
        let bedtime = responses.q_bedtime;
        let waketime = responses.q_waketime;
        let eff = 0;
        if (bedtime && waketime) {
            let bedHour = parseInt(bedtime.split(':')[0]);
            let bedMin = parseInt(bedtime.split(':')[1]);
            let wakeHour = parseInt(waketime.split(':')[0]);
            let wakeMin = parseInt(waketime.split(':')[1]);
            let timeInBed = (wakeHour*60+wakeMin) - (bedHour*60+bedMin);
            if (timeInBed < 0) timeInBed += 1440;
            let efficiency = (sleepHours * 60 / timeInBed) * 100;
            if (efficiency >= 85) eff = 0;
            else if (efficiency >= 75) eff = 1;
            else if (efficiency >= 65) eff = 2;
            else eff = 3;
        } else {
            // 如果没填时间，用直接选项 q_efficiency
            let effOpt = responses.q_efficiency;
            if (effOpt === '>85%') eff = 0;
            else if (effOpt === '75%-84%') eff = 1;
            else if (effOpt === '65%-74%') eff = 2;
            else eff = 3;
        }
        let comp4 = eff;
        // 成分5: 睡眠障碍 (从 q_difficulty_sleep, q_wake_night 等综合，简化取平均)
        let disturb = 0;
        let freqMap = { '无':0,'<1次/周':1,'1-2次/周':2,'≥3次/周':3 };
        let diff = freqMap[responses.q_difficulty_sleep] || 0;
        let wake = freqMap[responses.q_wake_night] || 0;
        disturb = Math.min(3, Math.floor((diff + wake)/2));
        // 成分6: 催眠药物
        let meds = freqMap[responses.q_meds] || 0;
        let comp6 = meds;
        // 成分7: 日间功能障碍
        let dayDys = freqMap[responses.q_day_dys] || 0;
        let comp7 = dayDys;
        let total = comp1 + comp2 + comp3 + comp4 + comp5 + comp6 + comp7;
        return Math.min(21, total);
    }

    function computeESS(responses) {
        let scoreMap = { '从不':0,'很少':1,'有时':2,'经常':3 };
        let read = scoreMap[responses.ess_read] || 0;
        let afternoon = scoreMap[responses.ess_afternoon] || 0;
        return read + afternoon; // 总分0-6，可乘以4换算为标准0-24，但保留原分
    }

    function computeISI(responses) {
        let scoreMap = { '无':0,'轻度':1,'中度':2,'重度':3,'极重度':4,
                         '非常满意':0,'满意':1,'一般':2,'不满意':3,'非常不满意':4,
                         '无':0,'轻微':1,'中等':2,'很大':3,'极严重':4 };
        let onset = scoreMap[responses.isi_onset] || 0;
        let maintain = scoreMap[responses.isi_maintain] || 0;
        let early = scoreMap[responses.isi_early] || 0;
        let satisfy = scoreMap[responses.isi_satisfy] || 0;
        let impact = scoreMap[responses.isi_impact] || 0;
        let worry = scoreMap[responses.isi_worry] || 0;
        let interfere = scoreMap[responses.isi_interfere] || 0;
        return onset + maintain + early + satisfy + impact + worry + interfere;
    }

    // 倾向分析
    function getTendencies(responses, psqi, ess, isi, lang) {
        let t = (key) => translations[lang][key] || key;
        let tendA = (psqi > 7) ? (lang==='zh'?'入睡准备期偏长':'Long sleep onset latency') : (lang==='zh'?'正常':'Normal');
        let tendB = (responses.q_wake_night && (responses.q_wake_night.includes('≥3') || responses.q_wake_night === '≥3x/week')) ? (lang==='zh'?'夜间易醒敏感':'Night awakening sensitivity') : (lang==='zh'?'夜间稳定性尚可':'Night stability OK');
        let tendC = (responses.q_day_dys && (responses.q_day_dys.includes('≥3') || responses.q_day_dys === '≥3x/week')) ? (lang==='zh'?'日间精力恢复偏慢':'Slow daytime recovery') : (lang==='zh'?'日间精力尚可':'Daytime energy OK');
        let tendD = (responses.q_meds && (responses.q_meds.includes('≥3') || responses.q_meds === '≥3x/week')) ? (lang==='zh'?'睡眠呼吸干扰风险可能':'Possible sleep breathing risk') : (lang==='zh'?'无明显呼吸风险迹象':'No obvious breathing risk');
        return [tendA, tendB, tendC, tendD];
    }

    // --------------------------------------------------------------
    // 全局状态
    // --------------------------------------------------------------
    let currentLang = 'zh';
    let currentPhoneHash = '';
    let currentPoints = 0;
    let submittedFlag = false; // 防止重复提交同一份问卷（前端简单控制）
    const apiEndpoint = "https://script.google.com/macros/s/AKfycbwUEFEIuUfw4SuuOJUux06vH3r570jWd00coWZnF3XNu-FgSriUGDL0uZRFPmWFeoEoMQ/exec";

    function t(key) { return translations[currentLang][key] || key; }

    // 渲染主界面
    async function renderMain() {
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>`;
        html += `<div style="background:#f0e7dd; padding:16px; border-radius:28px; margin-bottom:20px;">
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                        <input type="tel" id="phoneInput" placeholder="${t('phone_label')}" style="flex:2; min-width:150px;">
                        <button id="loginBtn" style="flex:0;">${t('login_btn')}</button>
                    </div>
                    <div id="pointsDisplay" class="points-balance" style="margin-top:12px;">${t('points_balance')}: ${currentPoints}</div>
                </div>`;
        html += `<div class="consent-box">
                    <label><input type="checkbox" id="consentCheck" /> ${t('consent_text')}</label><br/>
                    <label><input type="checkbox" id="rweCheck" /> ${t('rwe_label')}</label>
                 </div>`;
        const questions = getLocalizedQuestions(currentLang);
        questions.forEach((q, idx) => {
            html += `<div class="question"><div class="question-text">${idx+1}. ${q.text}</div>`;
            if (q.type === 'number') {
                html += `<input type="number" id="q_${q.key}" placeholder="${t('age')}" />`;
            } else if (q.type === 'select' && q.options) {
                html += `<select id="q_${q.key}"><option value="">-- ${currentLang==='zh'?'请选择':'Select'} --</option>`;
                q.options.forEach(opt => { html += `<option>${opt}</option>`; });
                html += `</select>`;
            } else if (q.type === 'time') {
                html += `<input type="time" id="q_${q.key}" />`;
            } else {
                html += `<input type="text" id="q_${q.key}" placeholder="${q.text}" />`;
            }
            html += `</div>`;
        });
        html += `<div class="btn-group"><button id="submitSurveyBtn">${t('submit_btn')}</button></div>`;

        // 积分商城
        const products = translations[currentLang].products;
        html += `<div class="shop-section"><h3>${t('shop_title')}</h3>`;
        products.forEach((p, idx) => {
            html += `<div class="product-item">
                        <span class="product-name">${p.name}</span>
                        <span class="product-points">${p.points} ${currentLang==='zh'?'积分':'pts'}</span>
                        <button class="exchange-btn" data-product-index="${idx}">${currentLang==='zh'?'兑换':'Exchange'}</button>
                    </div>`;
        });
        // 兑换记录
        let history = currentPhoneHash ? getExchangeHistory(currentPhoneHash) : [];
        if (history.length > 0) {
            html += `<div class="history-log"><strong>${t('exchange_history')}</strong><br>`;
            history.slice(-5).forEach(h => {
                html += `${h.product} (${h.points} pts) - ${new Date(h.time).toLocaleString()}<br>`;
            });
            html += `</div>`;
        }
        html += `</div>`;

        document.getElementById('dynamic-content').innerHTML = html;

        // 绑定登录事件
        document.getElementById('loginBtn').addEventListener('click', async () => {
            let phoneRaw = document.getElementById('phoneInput').value.trim();
            if (!phoneRaw) { alert(t('phone_label') + ' ' + (currentLang==='zh'?'不能为空':'required')); return; }
            currentPhoneHash = await sha256(phoneRaw);
            currentPoints = getUserPoints(currentPhoneHash);
            document.getElementById('pointsDisplay').innerText = `${t('points_balance')}: ${currentPoints}`;
            // 刷新兑换记录显示
            renderMain(); // 简单刷新以显示记录，但会丢失已填问卷？更好的方法是局部刷新，为简洁直接重新渲染保留手机号
            // 重新设置手机号输入框的值
            document.getElementById('phoneInput').value = phoneRaw;
        });
        document.getElementById('submitSurveyBtn').addEventListener('click', () => submitSurvey());
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (!currentPhoneHash) { alert(t('phone_label') + ' ' + (currentLang==='zh'?'请先登录':'Please login')); return; }
                let idx = parseInt(btn.dataset.productIndex);
                let product = products[idx];
                if (deductPoints(currentPhoneHash, product.points)) {
                    currentPoints = getUserPoints(currentPhoneHash);
                    document.getElementById('pointsDisplay').innerText = `${t('points_balance')}: ${currentPoints}`;
                    addExchangeRecord(currentPhoneHash, product.name, product.points);
                    alert(t('exchange_success'));
                    renderMain(); // 刷新记录
                    document.getElementById('phoneInput').value = document.getElementById('phoneInput').value;
                } else {
                    alert(t('exchange_fail_points'));
                }
            });
        });
    }

    async function submitSurvey() {
        if (submittedFlag) return;
        const consent = document.getElementById('consentCheck')?.checked;
        if (!consent) { alert(t('consent_text') + (currentLang==='zh'?' 请勾选同意':' Please consent')); return; }
        if (!currentPhoneHash) { alert(t('phone_label') + ' ' + (currentLang==='zh'?'请先登录':'Please login')); return; }

        const questions = getLocalizedQuestions(currentLang);
        let responses = {};
        for (let q of questions) {
            let el = document.getElementById(`q_${q.key}`);
            if (el) responses[q.key] = el.value;
        }
        // 检查是否已完成问卷
        let alreadyCompleted = hasCompletedSurvey(currentPhoneHash);
        let pointsEarned = 0;
        if (!alreadyCompleted) {
            addPoints(currentPhoneHash, 100);
            currentPoints = getUserPoints(currentPhoneHash);
            pointsEarned = 100;
            markCompletedSurvey(currentPhoneHash);
        }
        // 计分
        let psqi = computePSQI(responses);
        let ess = computeESS(responses);
        let isi = computeISI(responses);
        let tendencies = getTendencies(responses, psqi, ess, isi, currentLang);
        // 发送后端
        const payload = {
            phoneHash: currentPhoneHash,
            ...responses,
            psqi_total: psqi,
            ess_total: ess,
            isi_total: isi,
            tendencyA: tendencies[0],
            tendencyB: tendencies[1],
            tendencyC: tendencies[2],
            tendencyD: tendencies[3],
            points_earned: pointsEarned,
            language: currentLang,
            timestamp: new Date().toISOString()
        };
        fetch(apiEndpoint, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(e=>console.warn);
        submittedFlag = true;
        let msgHtml = pointsEarned ? `<div style="background:#d9e6c3; padding:10px; border-radius:20px; margin-bottom:16px;">✨ ${t('points_earned')} (${pointsEarned})</div>` : '';
        showReport(psqi, ess, isi, tendencies, msgHtml);
        // 更新积分显示
        let ptsDiv = document.getElementById('pointsDisplay');
        if (ptsDiv) ptsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
    }

    function showReport(psqi, ess, isi, tendencies, msgHtml) {
        let gradeText = psqi<=5 ? (currentLang==='zh'?'良好':'Good') : (currentLang==='zh'?'需关注':'Needs attention');
        let html = `<h1>${t('title')}</h1>${msgHtml}<div id="reportCapture" class="report-section">
                    <div class="score-card"><div class="flex-row"><strong>PSQI ${t('score_label')}: ${psqi}</strong><span class="badge">${gradeText}</span></div></div>
                    <div class="score-card"><strong>ESS ${t('score_label')}: ${ess}</strong> (0-6, 等价于标准0-24: ${ess*4})</div>
                    <div class="score-card"><strong>ISI ${t('score_label')}: ${isi}</strong> (0-28)</div>
                    <h3>${t('tendency_label')}</h3>
                    <ul><li>${tendencies[0]}</li><li>${tendencies[1]}</li><li>${tendencies[2]}</li><li>${tendencies[3]}</li></ul>
                    <div class="legal-note">${t('medical_disclaimer')}<br/>${t('ant_chain')}</div>
                  </div>
                  <div class="share-buttons">
                    <button id="shareWA" class="share-btn">${t('share_whatsapp')}</button>
                    <button id="saveImg" class="share-btn save-img">${t('save_image')}</button>
                  </div>
                  <button id="restartBtn" class="secondary" style="margin-top:20px;">${t('back_to_home')}</button>`;
        document.getElementById('dynamic-content').innerHTML = html;
        document.getElementById('shareWA').onclick = () => {
            let text = encodeURIComponent(`AROMA SUNÉ: PSQI ${psqi}, ESS ${ess}, ISI ${isi}`);
            window.open(`https://wa.me/?text=${text}`);
        };
        document.getElementById('saveImg').onclick = () => {
            html2canvas(document.getElementById('reportCapture')).then(canvas => {
                let link = document.createElement('a');
                link.download = 'sleep_report.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
        document.getElementById('restartBtn').onclick = () => location.reload();
    }

    function setLanguage(lang) {
        currentLang = lang;
        renderMain();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function init() {
        renderMain();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });
    }
    init();
</script>
</body>
