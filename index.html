<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ 睡眠健康评估</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5efe7; margin: 0; padding: 20px; color: #2c2a29; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 6px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }
        h1 { font-size: 1.8rem; font-weight: 500; margin: 0 0 8px; color: #5e2e1c; }
        .sub { color: #7e6a5c; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; }
        .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
        select, input[type="number"], input[type="time"], input[type="tel"] { padding: 8px 12px; border-radius: 24px; border: 1px solid #ddd0c0; background: #fffaf5; width: 100%; max-width: 280px; }
        .btn-group { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        button { background: #b99470; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button.secondary { background: #e2d5c8; color: #5e4b3c; }
        .points-balance { font-size: 1.4rem; font-weight: bold; text-align: center; background: #fff0e0; border-radius: 40px; padding: 8px; margin: 16px 0; }
        .info-banner { background: #e6f4ea; border-left: 4px solid #2e7d32; padding: 10px 16px; border-radius: 20px; margin: 12px 0; font-size: 13px; }
        .consent-box { background: #f9f3ec; padding: 12px; border-radius: 16px; margin: 20px 0; }
        .verification-row { display: flex; gap: 10px; margin-top: 10px; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 40px; font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        @media (max-width: 550px) { .verification-row { flex-direction: column; } .btn-group { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="lang-bar" id="langBar"></div>
    <div id="dynamic-content"><div class="loading-spinner"></div> 加载中...</div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ======================= 后端地址 =======================
    const BACKEND = "https://script.google.com/macros/s/AKfycbx27ps82o35dxHkG9PrXGKkF0AQSckl76yqUJ0f00I5zDH4YEgkLxaCBWTAqraRLeN27A/exec";
    
    // ======================= 全局变量 =======================
    let authToken = null;
    let currentPhoneHash = null;
    let currentPoints = 0;
    let currentLang = 'zh';
    let isLoading = false;
    
    // ======================= 多语言 =======================
    const translations = {
        zh: {
            title: "AROMA SUNÉ 睡眠与情绪健康评估", subtitle: "基于PSQI/ESS/ISI国际量表，非医疗诊断",
            phone: "手机号", send_code: "发送验证码", verify_code: "验证码", login: "登录",
            consent: "我已阅读并同意数据隐私条款", rwe: "我同意将匿名数据用于RWE研究",
            submit: "提交并查看报告", points: "我的积分", info: "✨ 积分可在Health365抵扣保费",
            back: "重新评估", age: "您的年龄？", menopause: "绝经状态", meno1: "未绝经", meno2: "围绝经期", meno3: "已绝经",
            loading: "加载中...", submitting: "提交中...", sending: "发送中...", network_error: "网络连接失败",
            q1: "1. 您如何评价自己的睡眠质量？"
        },
        en: {
            title: "AROMA SUNÉ Sleep & Mood Assessment", subtitle: "Based on PSQI/ESS/ISI",
            phone: "Mobile", send_code: "Send Code", verify_code: "Code", login: "Login",
            consent: "I agree to the privacy policy", rwe: "Share data for RWE",
            submit: "Submit & View Report", points: "My Points", info: "✨ Points for Health365",
            back: "New Assessment", age: "Your age?", menopause: "Menopause", meno1: "Pre", meno2: "Peri", meno3: "Post",
            loading: "Loading...", submitting: "Submitting...", sending: "Sending...", network_error: "Network error",
            q1: "1. How would you rate your sleep quality?"
        }
    };
    translations['ms'] = translations['en'];
    translations['id'] = translations['en'];
    
    function t(key) { return translations[currentLang]?.[key] || translations.zh[key] || key; }
    
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = isError ? '#dc2626' : '#333';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    async function fetchWithTimeout(url, options, timeout = 30000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        try {
            const response = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    }
    
    async function apiCall(params, options = {}, retries = 2) {
        let url = BACKEND;
        if (params) url += '?' + new URLSearchParams(params).toString();
        for (let i = 0; i < retries; i++) {
            try {
                const res = await fetchWithTimeout(url, {
                    headers: options.token ? { 'Authorization': 'Bearer ' + options.token } : {},
                    ...options
                });
                return await res.json();
            } catch (error) {
                if (i === retries - 1) throw error;
                await new Promise(r => setTimeout(r, 1000 * (i + 1)));
            }
        }
    }
    
    async function sendCode() {
        if (isLoading) return;
        const phone = document.getElementById('phoneInput')?.value.trim();
        if (!phone) return showToast('请输入手机号', true);
        isLoading = true;
        const btn = document.getElementById('sendCodeBtn');
        if (btn) { btn.disabled = true; btn.innerHTML = `<span class="loading-spinner"></span>${t('sending')}`; }
        try {
            const data = await apiCall({ action: 'sendCode', phone });
            showToast(data.message || '验证码已发送');
        } catch (error) {
            showToast(t('network_error'), true);
        } finally {
            isLoading = false;
            if (btn) { btn.disabled = false; btn.innerHTML = t('send_code'); }
        }
    }
    
    async function doLogin() {
        if (isLoading) return;
        const phone = document.getElementById('phoneInput')?.value.trim();
        const code = document.getElementById('codeInput')?.value.trim();
        if (!phone || !code) return showToast('请输入手机号和验证码', true);
        isLoading = true;
        const btn = document.getElementById('loginBtn');
        if (btn) { btn.disabled = true; btn.innerHTML = `<span class="loading-spinner"></span>${t('loading')}`; }
        try {
            const data = await apiCall({ action: 'verify', phone, code });
            if (data.status === 'success') {
                authToken = data.token;
                currentPhoneHash = data.phoneHash;
                localStorage.setItem('token', authToken);
                localStorage.setItem('phoneHash', currentPhoneHash);
                await loadPoints();
                showToast('登录成功');
                renderQuestionnaire();
            } else {
                showToast(data.message || '验证码错误', true);
            }
        } catch (error) {
            showToast(t('network_error'), true);
        } finally {
            isLoading = false;
            if (btn) { btn.disabled = false; btn.innerHTML = t('login'); }
        }
    }
    
    async function loadPoints() {
        if (!authToken) return;
        try {
            const data = await apiCall({ action: 'points', token: authToken });
            currentPoints = data.points || 0;
            const ptsDiv = document.getElementById('pointsDisplay');
            if (ptsDiv) ptsDiv.innerText = `${t('points')}: ${currentPoints}`;
        } catch (e) { console.warn(e); }
    }
    
    // 报告页渲染函数
    function renderReport(completionCode, pointsBalance, recordId) {
        const content = `
            <h1>📊 睡眠评估报告</h1>
            <div class="points-balance">🎉 获得 ${pointsBalance} 积分</div>
            <div class="info-banner">
                <strong>✨ 完成码：${completionCode}</strong><br>
                请保存此码，用于后续查询或HPB积分。
            </div>
            <div class="consent-box">
                📋 记录ID：${recordId}<br>
                您的睡眠数据已安全存储。
            </div>
            <button class="btn-primary" onclick="renderLogin()">返回首页</button>
        `;
        document.getElementById('dynamic-content').innerHTML = content;
    }
    
    async function submitSurvey() {
        if (isLoading) return;
        const consent = document.getElementById('consentCheck')?.checked;
        if (!consent) return showToast(t('consent'), true);
        
        const formData = {
            age: parseInt(document.getElementById('age')?.value) || 0,
            menopause: document.getElementById('menopause')?.value || '',
            sleep_quality: document.getElementById('sleep_quality')?.value || '',
            language: currentLang,
            points_earned: 100,
            visit_type: 'baseline'
        };
        
        isLoading = true;
        const btn = document.getElementById('submitBtn');
        if (btn) { btn.disabled = true; btn.innerHTML = `<span class="loading-spinner"></span>${t('submitting')}`; }
        
        try {
            const response = await fetchWithTimeout(BACKEND, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ token: authToken, payload: formData })
            });
            const result = await response.json();
            if (result.status === 'success') {
                showToast(`提交成功！积分：${result.points_balance}`);
                await loadPoints();
                renderReport(result.completion_code, result.points_balance, result.record_id);
            } else {
                showToast(result.message || '提交失败', true);
            }
        } catch (error) {
            showToast(t('network_error'), true);
        } finally {
            isLoading = false;
            if (btn) { btn.disabled = false; btn.innerHTML = t('submit'); }
        }
    }
    
    function renderLogin() {
        document.getElementById('dynamic-content').innerHTML = `
            <h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
            <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
                <input type="tel" id="phoneInput" placeholder="${t('phone')}" style="width:100%; margin-bottom:10px;">
                <div class="verification-row">
                    <input type="text" id="codeInput" placeholder="${t('verify_code')}" style="flex:2;">
                    <button id="sendCodeBtn" style="flex:1;" onclick="sendCode()">${t('send_code')}</button>
                </div>
                <button id="loginBtn" style="width:100%; margin-top:10px;" onclick="doLogin()">${t('login')}</button>
                <div id="pointsDisplay" class="points-balance">${t('points')}: 0</div>
                <div class="info-banner">${t('info')}</div>
                <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent')}</label></div>
                <div class="consent-box"><label><input type="checkbox" id="rweCheck"> ${t('rwe')}</label></div>
            </div>
        `;
    }
    
    function renderQuestionnaire() {
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div id="pointsDisplay" class="points-balance">${t('points')}: ${currentPoints}</div>
        <button class="secondary" onclick="renderLogin()" style="margin-bottom:20px;">${t('back')}</button>
        <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent')}</label><br>
        <label><input type="checkbox" id="rweCheck"> ${t('rwe')}</label></div>
        <div class="question"><div>${t('age')}</div><input type="number" id="age"></div>
        <div class="question"><div>${t('menopause')}</div><select id="menopause"><option>${t('meno1')}</option><option>${t('meno2')}</option><option>${t('meno3')}</option></select></div>
        <div class="question"><div>${t('q1')}</div><select id="sleep_quality"><option>非常好</option><option>较好</option><option>较差</option><option>非常差</option></select></div>
        <div class="btn-group"><button id="submitBtn" onclick="submitSurvey()">${t('submit')}</button></div>`;
        document.getElementById('dynamic-content').innerHTML = html;
        loadPoints();
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        if (authToken) renderQuestionnaire(); else renderLogin();
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
    }
    
    function renderLanguageBar() {
        const langs = [
            { code: 'zh', name: '中文' },
            { code: 'en', name: 'English' },
            { code: 'ms', name: 'Melayu' },
            { code: 'id', name: 'Indonesia' }
        ];
        document.getElementById('langBar').innerHTML = langs.map(l => 
            `<button class="lang-btn ${currentLang === l.code ? 'active' : ''}" data-lang="${l.code}" onclick="setLanguage('${l.code}')">${l.name}</button>`
        ).join('');
    }
    
    function init() {
        renderLanguageBar();
        const savedToken = localStorage.getItem('token');
        const savedPhoneHash = localStorage.getItem('phoneHash');
        if (savedToken && savedPhoneHash) {
            authToken = savedToken;
            currentPhoneHash = savedPhoneHash;
            loadPoints().then(() => renderQuestionnaire()).catch(() => renderLogin());
        } else {
            renderLogin();
        }
    }
    
    window.sendCode = sendCode;
    window.doLogin = doLogin;
    window.submitSurvey = submitSurvey;
    window.renderLogin = renderLogin;
    window.setLanguage = setLanguage;
    
    init();
</script>
</body>
</html>
