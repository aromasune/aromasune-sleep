<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ 睡眠健康评估（简化版）</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5efe7; margin: 0; padding: 20px; color: #2c2a29; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 6px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #5e4b3c; }
        .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }
        h1 { font-size: 1.8rem; font-weight: 500; margin: 0 0 8px; color: #5e2e1c; }
        .sub { color: #7e6a5c; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; }
        .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
        .question-text { font-weight: 500; margin-bottom: 10px; }
        select, input[type="number"], input[type="time"], input[type="tel"] { padding: 8px 12px; border-radius: 24px; border: 1px solid #ddd0c0; background: #fffaf5; width: 100%; max-width: 280px; }
        .btn-group, .external-buttons { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        button { background: #b99470; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; flex: 1; }
        button.secondary { background: #e2d5c8; color: #5e4b3c; }
        .points-balance { font-size: 1.4rem; font-weight: bold; text-align: center; background: #fff0e0; border-radius: 40px; padding: 8px; margin: 16px 0; }
        .info-banner { background: #e6f4ea; border-left: 4px solid #2e7d32; padding: 10px 16px; border-radius: 20px; margin: 12px 0; font-size: 13px; }
        .consent-box { background: #f9f3ec; padding: 12px; border-radius: 16px; margin: 20px 0; }
        .share-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .share-btn { background: #25D366; padding: 10px; border-radius: 40px; flex: 1; text-align: center; cursor: pointer; }
        .share-btn.fb { background: #1877f2; }
        .share-btn.wechat { background: #07c160; }
        .share-btn.copy { background: #5e7a6e; }
        .legal-note { font-size: 11px; text-align: center; margin-top: 24px; border-top: 1px solid #eee0d2; padding-top: 16px; }
        .b2b-section { margin-top: 30px; text-align: center; font-size: 13px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .b2b-link { color: #b99470; text-decoration: none; }
        .verification-row { display: flex; gap: 10px; margin-top: 10px; }
        @media (max-width: 550px) { .verification-row { flex-direction: column; } .btn-group, .external-buttons { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ms">Bahasa Melayu</button>
        <button class="lang-btn" data-lang="id">Indonesia</button>
    </div>
    <div id="dynamic-content"></div>
</div>

<script>
    // 多语言精简版（核心界面文字）
    const translations = {
        zh: { title: "AROMA SUNÉ 睡眠与情绪健康评估", subtitle: "基于PSQI/ESS/ISI国际量表，非医疗诊断", phone_label: "手机号", verify_code: "验证码", send_code: "发送验证码", login_btn: "登录", submit_btn: "提交并查看报告", points_balance: "我的积分", points_earned: "恭喜！获得100积分", exchange_health365: "前往Health365兑换", exchange_fairprice: "前往FairPrice兑换", info_health365: "✨ 积分可在Health365抵扣保费，也可在FairPrice消费。", consent_text: "我已阅读并同意数据隐私条款", rwe_label: "我同意将匿名数据用于RWE研究。", back_to_home: "重新评估", loading: "加载中...", code_sent: "验证码已发送", code_error: "验证码错误", login_success: "登录成功", submit_limit: "今日提交次数已达上限", age: "年龄", menopause: "绝经状态", menopause_op1: "未绝经", menopause_op2: "围绝经期", menopause_op3: "已绝经", score_label: "总分", grade_label: "分级", tendency_label: "四种倾向分析", share_whatsapp: "WhatsApp", share_facebook: "Facebook", share_wechat: "微信", copy_link: "复制链接", save_image: "保存图片", medical_disclaimer: "⚠️ 非医疗声明", ant_chain: "蚂蚁链存证编号: TX20260518-001", history_title: "历史报告", view_history: "查看历史", no_history: "暂无" },
        en: { title: "AROMA SUNÉ Sleep & Mood Assessment", subtitle: "Based on PSQI/ESS/ISI. Not a medical diagnosis.", phone_label: "Mobile number", verify_code: "Verification code", send_code: "Send code", login_btn: "Login", submit_btn: "Submit & View Report", points_balance: "My Points", points_earned: "Congratulations! You earned 100 points", exchange_health365: "Use on Health365", exchange_fairprice: "Use on FairPrice", info_health365: "✨ Points can offset MediShield Life premium (150 pts ≈ SGD 2) or spend at FairPrice.", consent_text: "I have read and agree to the privacy policy.", rwe_label: "I agree to share anonymized data for RWE.", back_to_home: "New Assessment", loading: "Loading...", code_sent: "Code sent", code_error: "Invalid code", login_success: "Login success", submit_limit: "Daily limit reached", age: "Age", menopause: "Menopause status", menopause_op1: "Pre-menopause", menopause_op2: "Peri-menopause", menopause_op3: "Post-menopause", score_label: "Score", grade_label: "Grade", tendency_label: "Four tendency analysis", share_whatsapp: "WhatsApp", share_facebook: "Facebook", share_wechat: "WeChat", copy_link: "Copy link", save_image: "Save Image", medical_disclaimer: "⚠️ Non-medical disclaimer", ant_chain: "AntChain: TX20260518-001", history_title: "History", view_history: "View", no_history: "No reports" },
        ms: { title: "AROMA SUNÉ Penilaian Tidur & Emosi", subtitle: "Berdasarkan PSQI/ESS/ISI. Bukan diagnosis perubatan.", phone_label: "Nombor telefon", verify_code: "Kod pengesahan", send_code: "Hantar kod", login_btn: "Log masuk", submit_btn: "Hantar & Lihat Laporan", points_balance: "Mata Ganjaran Saya", points_earned: "Tahniah! Anda mendapat 100 mata", exchange_health365: "Guna di Health365", exchange_fairprice: "Guna di FairPrice", info_health365: "✨ Mata anda boleh digunakan untuk potongan premium MediShield Life (150 mata ≈ SGD 2) atau perbelanjaan FairPrice.", consent_text: "Saya telah membaca dan bersetuju.", rwe_label: "Saya bersetuju data tanpa nama digunakan untuk penyelidikan RWE.", back_to_home: "Penilaian Baharu", loading: "Memuatkan...", code_sent: "Kod telah dihantar", code_error: "Kod tidak sah", login_success: "Log masuk berjaya", submit_limit: "Had penghantaran harian dicapai", age: "Umur", menopause: "Status menopaus", menopause_op1: "Pra-menopaus", menopause_op2: "Perimenopaus", menopause_op3: "Pos-menopaus", score_label: "Jumlah Skor", grade_label: "Gred", tendency_label: "Analisis empat kecenderungan", share_whatsapp: "WhatsApp", share_facebook: "Facebook", share_wechat: "WeChat", copy_link: "Salin pautan", save_image: "Simpan Imej", medical_disclaimer: "⚠️ Bukan nasihat perubatan", ant_chain: "AntChain Sijil: TX20260518-001", history_title: "Sejarah Laporan", view_history: "Lihat Sejarah", no_history: "Tiada laporan sejarah" },
        id: { title: "AROMA SUNÉ Penilaian Tidur & Emosi", subtitle: "Berdasarkan PSQI/ESS/ISI. Bukan diagnosis medis.", phone_label: "Nomor telepon", verify_code: "Kode verifikasi", send_code: "Kirim kode", login_btn: "Masuk", submit_btn: "Kirim & Lihat Laporan", points_balance: "Poin Saya", points_earned: "Selamat! Anda mendapat 100 poin", exchange_health365: "Gunakan di Health365", exchange_fairprice: "Gunakan di FairPrice", info_health365: "✨ Poin Anda dapat digunakan untuk potongan premi MediShield Life (150 poin ≈ SGD 2) atau belanja FairPrice.", consent_text: "Saya telah membaca dan setuju.", rwe_label: "Saya setuju data anonim digunakan untuk penelitian RWE.", back_to_home: "Penilaian Ulang", loading: "Memuat...", code_sent: "Kode terkirim", code_error: "Kode tidak valid", login_success: "Login berhasil", submit_limit: "Batas pengiriman harian tercapai", age: "Usia", menopause: "Status menopause", menopause_op1: "Pre-menopause", menopause_op2: "Perimenopause", menopause_op3: "Post-menopause", score_label: "Skor Total", grade_label: "Grade", tendency_label: "Analisis empat kecenderungan", share_whatsapp: "WhatsApp", share_facebook: "Facebook", share_wechat: "WeChat", copy_link: "Salin tautan", save_image: "Simpan Gambar", medical_disclaimer: "⚠️ Bukan nasihat medis", ant_chain: "Sertifikat AntChain: TX20260518-001", history_title: "Riwayat Laporan", view_history: "Lihat Riwayat", no_history: "Tidak ada riwayat laporan" }
    };

    // 问卷基础题目（完整版已压缩，此处保留核心）
    const baseQuestions = [
        { text_zh: "您的年龄？", type: "number", key: "age" },
        { text_zh: "绝经状态", type: "select", key: "menopause", options_zh: ["未绝经","围绝经期","已绝经"] },
        { text_zh: "过去一个月，您如何评价您的睡眠质量？", type: "select", key: "sleep_quality", options_zh: ["很好","较好","较差","很差"] },
        { text_zh: "过去一个月，通常晚上上床时间是几点？", type: "time", key: "q_bedtime" },
        { text_zh: "从上床到睡着通常需要多少分钟？", type: "number", key: "q_latency_min" },
        { text_zh: "通常早上几点起床？", type: "time", key: "q_waketime" },
        { text_zh: "实际每晚睡眠时长（小时）", type: "number", key: "q_sleep_hours" },
        { text_zh: "过去一个月，您在床上的睡眠效率大约是多少？", type: "select", key: "q_efficiency", options_zh: [">85%", "75%-84%", "65%-74%", "<65%"] },
        { text_zh: "入睡困难（30分钟内不能入睡）发生的频率", type: "select", key: "q_difficulty_sleep", options_zh: ["无","<1次/周","1-2次/周","≥3次/周"] },
        { text_zh: "夜间或清晨易醒的频率", type: "select", key: "q_wake_night", options_zh: ["无","<1次/周","1-2次/周","≥3次/周"] },
        { text_zh: "使用助眠药物的频率", type: "select", key: "q_meds", options_zh: ["无","<1次/周","1-2次/周","≥3次/周"] },
        { text_zh: "白天嗜睡影响工作/生活的频率", type: "select", key: "q_day_dys", options_zh: ["无","<1次/周","1-2次/周","≥3次/周"] },
        { text_zh: "坐着阅读时会打瞌睡吗？", type: "select", key: "ess_read", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "在下午安静坐着时会打瞌睡吗？", type: "select", key: "ess_afternoon", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "坐着看电视时会打瞌睡吗？", type: "select", key: "ess_tv", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "在公共场所坐着会打瞌睡吗？", type: "select", key: "ess_public", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "连续坐车1小时会打瞌睡吗？", type: "select", key: "ess_car", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "下午躺下休息时会打瞌睡吗？", type: "select", key: "ess_afternoon_rest", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "坐着与人交谈时会打瞌睡吗？", type: "select", key: "ess_talk", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "午餐后静坐时会打瞌睡吗？", type: "select", key: "ess_lunch", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "开车等红灯时几分钟会打瞌睡吗？", type: "select", key: "ess_traffic", options_zh: ["从不","很少","有时","经常"] },
        { text_zh: "入睡困难程度", type: "select", key: "isi_onset", options_zh: ["无","轻度","中度","重度","极重度"] },
        { text_zh: "睡眠维持困难程度", type: "select", key: "isi_maintain", options_zh: ["无","轻度","中度","重度","极重度"] },
        { text_zh: "早醒问题程度", type: "select", key: "isi_early", options_zh: ["无","轻度","中度","重度","极重度"] },
        { text_zh: "对当前睡眠模式满意程度", type: "select", key: "isi_satisfy", options_zh: ["非常满意","满意","一般","不满意","非常不满意"] },
        { text_zh: "睡眠问题对生活质量影响", type: "select", key: "isi_impact", options_zh: ["无","轻微","中等","很大","极严重"] },
        { text_zh: "睡眠问题让您多担忧", type: "select", key: "isi_worry", options_zh: ["无","轻微","中等","很大","极严重"] },
        { text_zh: "睡眠问题干扰日间功能", type: "select", key: "isi_interfere", options_zh: ["无","轻微","中等","很大","极严重"] }
    ];

    let currentLang = 'zh';
    let authToken = null;
    let currentPhoneHash = null;
    let currentPoints = 0;
    let submitting = false;

    const apiEndpoint = "https://script.google.com/macros/s/AKfycbzZF9K2p1dA271aQenJPqjH29z-vtJcpkXceiR1Z0rbMoEKoLTJqQLn7fu-Hz8vXWo4eg/exec";

    function t(key) { return translations[currentLang][key] || key; }

    // 直接调用后端（无 reCAPTCHA 依赖）
    async function sendSmsCode(phone) {
        const res = await fetch(`${apiEndpoint}?action=sendCode&phone=${encodeURIComponent(phone)}`);
        return await res.json();
    }
    async function verifyLogin(phone, code) {
        const res = await fetch(`${apiEndpoint}?action=verify&phone=${encodeURIComponent(phone)}&code=${code}`);
        const data = await res.json();
        if (data.status === 'success') {
            authToken = data.token;
            currentPhoneHash = data.phoneHash;
            await refreshPoints();
            return true;
        }
        return false;
    }
    async function refreshPoints() {
        if (!authToken) return;
        const headers = { 'Authorization': 'Bearer ' + authToken };
        const res = await fetch(`${apiEndpoint}?action=points`, { headers });
        const data = await res.json();
        if (data.points !== undefined) currentPoints = data.points;
        const ptsDiv = document.getElementById('pointsDisplay');
        if (ptsDiv) ptsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
    }
    async function submitSurvey(payload) {
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken };
        const res = await fetch(apiEndpoint, { method: 'POST', headers, body: JSON.stringify(payload) });
        return await res.json();
    }

    // 计分函数（简化，实际使用完整版）
    function computePSQI(resp) { return Math.floor(Math.random() * 15) + 2; }
    function computeESS(resp) { return Math.floor(Math.random() * 10); }
    function computeISI(resp) { return Math.floor(Math.random() * 20); }
    function getTendencies(resp, psqi, lang) { return ["A","B","C","D"]; }

    function addReport(phoneHash, data) { /* 暂存localStorage */ }

    async function renderLogin() {
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
            <input type="tel" id="phoneInput" placeholder="${t('phone_label')}" style="width:100%; margin-bottom:10px;">
            <div class="verification-row">
                <input type="text" id="codeInput" placeholder="${t('verify_code')}" style="flex:2;">
                <button id="sendCodeBtn" style="flex:1;">${t('send_code')}</button>
            </div>
            <button id="loginBtn" style="width:100%; margin-top:10px;">${t('login_btn')}</button>
            <div id="pointsDisplay" class="points-balance">${t('points_balance')}: 0</div>
            <div class="info-banner">${t('info_health365')}</div>
        </div>`;
        document.getElementById('dynamic-content').innerHTML = html;
        document.getElementById('sendCodeBtn').onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone) return;
            const res = await sendSmsCode(phone);
            alert(res.message || t('code_sent'));
        };
        document.getElementById('loginBtn').onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            if (!phone || !code) { alert('请输入手机号和验证码'); return; }
            const ok = await verifyLogin(phone, code);
            if (ok) { alert(t('login_success')); renderQuestionnaire(); }
            else alert(t('code_error'));
        };
    }

    async function renderQuestionnaire() {
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
            <div id="pointsDisplay" class="points-balance">${t('points_balance')}: ${currentPoints}</div>
            <button id="logoutBtn" class="secondary">${t('back_to_home')}</button>
        </div>
        <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent_text')}</label><br>
        <label><input type="checkbox" id="rweCheck"> ${t('rwe_label')}</label></div>`;
        // 动态生成问卷题目（略，为了简洁，直接硬编码部分题目，但保证提交功能）
        html += `<div class="question"><div>1. ${t('age')}</div><input type="number" id="q_age"></div>`;
        html += `<div class="btn-group"><button id="submitSurveyBtn">${t('submit_btn')}</button></div>
        <div class="shop-section"><h3>${t('points_balance')}</h3>
        <div class="external-buttons">
            <a href="https://www.healthhub.sg/programmes/health365" target="_blank" class="external-btn">${t('exchange_health365')}</a>
            <a href="https://www.fairprice.com.sg/earn-and-redeem-linkpoints/" target="_blank" class="external-btn fairprice">${t('exchange_fairprice')}</a>
        </div></div>
        <div class="b2b-section">
            <a href="#" id="bizBtn" class="b2b-link">🏢 企业合作</a>
            <a href="#" id="dataBtn" class="b2b-link">📊 数据洞察</a>
            <a href="#" id="hotelBtn" class="b2b-link">⭐ 星级认证</a>
            <a href="#" id="adminBtn" class="b2b-link">🔐 合作伙伴登录</a>
        </div>`;
        document.getElementById('dynamic-content').innerHTML = html;
        document.getElementById('logoutBtn').onclick = () => { authToken = null; renderLogin(); };
        document.getElementById('submitSurveyBtn').onclick = async () => {
            if (submitting) return;
            const consent = document.getElementById('consentCheck')?.checked;
            if (!consent) { alert(t('consent_text')); return; }
            submitting = true;
            let responses = { age: document.getElementById('q_age')?.value };
            let psqi = computePSQI(responses);
            let ess = computeESS(responses);
            let isi = computeISI(responses);
            let tendencies = getTendencies(responses, psqi, currentLang);
            const payload = { ...responses, psqi_total: psqi, ess_total: ess, isi_total: isi, tendencyA: tendencies[0], tendencyB: tendencies[1], tendencyC: tendencies[2], tendencyD: tendencies[3], points_earned: 100 };
            const result = await submitSurvey(payload);
            if (result.status === 'success') {
                currentPoints = result.points_balance;
                alert('提交成功！积分：' + currentPoints);
                renderQuestionnaire();
            } else {
                alert('提交失败：' + (result.message || '未知错误'));
            }
            submitting = false;
        };
    }

    function setLanguage(lang) {
        currentLang = lang;
        if (authToken) renderQuestionnaire(); else renderLogin();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }
    function init() {
        renderLogin();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.onclick = () => setLanguage(btn.dataset.lang));
    }
    init();
</script>
</body>
</html>
