        if (lang === 'zh') return options_zh;
        const map = {
            en: { '未绝经':'Pre-menopause','围绝经期':'Peri-menopause','已绝经':'Post-menopause',
                  '很好':'Very good','较好':'Good','较差':'Poor','很差':'Very poor',
                  '无':'None','<1次/周':'<1x/week','1-2次/周':'1-2x/week','≥3次/周':'≥3x/week',
                  '从不':'Never','很少':'Rarely','有时':'Sometimes','经常':'Often',
                  '轻度':'Mild','中度':'Moderate','重度':'Severe','极重度':'Very severe',
                  '非常满意':'Very satisfied','满意':'Satisfied','一般':'Neutral','不满意':'Dissatisfied','非常不满意':'Very dissatisfied',
                  '轻微':'Slight','中等':'Moderate','很大':'Much','极严重':'Very much',
                  '>85%':'>85%','75%-84%':'75%-84%','65%-74%':'65%-74%','<65%':'<65%' }
        };
        const m = map[lang] || map.en;
        return options_zh.map(opt => m[opt] || opt);
    }

            '坐着阅读时会打瞌睡吗？':'Doze off while reading?','在下午安静坐着时会打瞌睡吗？':'Doze off sitting quietly?',

            '连续坐车1小时会打瞌睡吗？':'Doze off as car passenger 1h?','下午躺下休息时会打瞌睡吗？':'Doze off lying down afternoon?',
            '坐着与人交谈时会打瞌睡吗？':'Doze off while talking?','午餐后静坐时会打瞌睡吗？':'Doze off after lunch sitting?',
            '开车等红灯时几分钟会打瞌睡吗？':'Doze off while stopped in traffic?',
            '入睡困难程度':'Difficulty falling asleep','睡眠维持困难程度':'Difficulty staying asleep','早醒问题程度':'Early waking',
            '对当前睡眠模式满意程度':'Satisfaction with sleep','睡眠问题对生活质量影响':'Impact on quality of life',
            '睡眠问题让您多担忧':'Worry about sleep','睡眠问题干扰日间功能':'Interfere with daytime function'
        };
        return baseQuestions.map(q => {
            let text = q.text_zh;
            if (lang !== 'zh') text = simpleMap[text] || text;
            let options = q.options_zh ? translateOptions(q.options_zh, lang) : null;
            return { ...q, text, options };
        });
    }

    // 工具函数
    async function sha256(message) {
        const encoder = new TextEncoder();
        const data = encoder.encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // 积分存储
    const STORAGE_KEY = 'aromasune_points_data';
    const COMPLETED_KEY_PREFIX = 'completed_';
    const EXCHANGE_HISTORY_PREFIX = 'exchange_';
    const REPORTS_HISTORY_PREFIX = 'reports_';

    function getUserPoints(phoneHash) { let d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); return d[phoneHash]||0; }
    function setUserPoints(phoneHash, pts) { let d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); d[phoneHash]=pts; localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }
    function addPoints(phoneHash, amt) { let cur=getUserPoints(phoneHash); setUserPoints(phoneHash,cur+amt); return cur+amt; }
    function deductPoints(phoneHash, amt) { let cur=getUserPoints(phoneHash); if(cur>=amt){ setUserPoints(phoneHash,cur-amt); return true; } return false; }
    function hasCompletedSurvey(phoneHash) { return localStorage.getItem(COMPLETED_KEY_PREFIX+phoneHash)==='true'; }
    function markCompletedSurvey(phoneHash) { localStorage.setItem(COMPLETED_KEY_PREFIX+phoneHash,'true'); }
    function addExchangeRecord(phoneHash,prod,pts) { let key=EXCHANGE_HISTORY_PREFIX+phoneHash; let h=JSON.parse(localStorage.getItem(key)||'[]'); h.push({product:prod,points:pts,time:new Date().toISOString()}); localStorage.setItem(key,JSON.stringify(h)); }
    function getExchangeHistory(phoneHash) { let key=EXCHANGE_HISTORY_PREFIX+phoneHash; return JSON.parse(localStorage.getItem(key)||'[]'); }
    function addReportRecord(phoneHash, reportData) { let key=REPORTS_HISTORY_PREFIX+phoneHash; let arr=JSON.parse(localStorage.getItem(key)||'[]'); arr.push({ ...reportData, timestamp: new Date().toISOString() }); localStorage.setItem(key,JSON.stringify(arr)); }
    function getReportHistory(phoneHash) { let key=REPORTS_HISTORY_PREFIX+phoneHash; return JSON.parse(localStorage.getItem(key)||'[]'); }

    // 计分函数
    function computePSQI(responses) {
        try{
            let qualityMap = { '很好':0, '较好':1, '较差':2, '很差':3, 'Very good':0, 'Good':1, 'Poor':2, 'Very poor':3 };
            let comp1 = qualityMap[responses.sleep_quality] || 1;
            let latencyMin = parseInt(responses.q_latency_min) || 0;
            let comp2 = latencyMin<=15?0:(latencyMin<=30?1:(latencyMin<=60?2:3));
            let sleepHours = parseFloat(responses.q_sleep_hours) || 0;
            let comp3 = sleepHours>=7?0:(sleepHours>=6?1:(sleepHours>=5?2:3));
            let comp4 = 0;
            if(responses.q_bedtime && responses.q_waketime && sleepHours){
                let bedH=parseInt(responses.q_bedtime.split(':')[0]), bedM=parseInt(responses.q_bedtime.split(':')[1]);
                let wakeH=parseInt(responses.q_waketime.split(':')[0]), wakeM=parseInt(responses.q_waketime.split(':')[1]);
                let timeInBed = (wakeH*60+wakeM) - (bedH*60+bedM);
                if(timeInBed<0) timeInBed+=1440;
                let eff = (sleepHours*60/timeInBed)*100;
                if(eff>=85) comp4=0; else if(eff>=75) comp4=1; else if(eff>=65) comp4=2; else comp4=3;
            } else {
                let effOpt=responses.q_efficiency;
                if(effOpt==='>85%') comp4=0; else if(effOpt==='75%-84%') comp4=1; else if(effOpt==='65%-74%') comp4=2; else comp4=3;
            }
            let freqMap={'无':0,'<1次/周':1,'1-2次/周':2,'≥3次/周':3,'None':0,'<1x/week':1,'1-2x/week':2,'≥3x/week':3};
            let diff=freqMap[responses.q_difficulty_sleep]||0;
            let wake=freqMap[responses.q_wake_night]||0;
            let comp5 = Math.min(3,Math.floor((diff+wake)/2));
            let comp6 = freqMap[responses.q_meds]||0;
            let comp7 = freqMap[responses.q_day_dys]||0;
            return Math.min(21, comp1+comp2+comp3+comp4+comp5+comp6+comp7);
        } catch(e){ return 10; }
    }
    function computeESS(responses) {
        let scoreMap={'从不':0,'很少':1,'有时':2,'经常':3,'Never':0,'Rarely':1,'Sometimes':2,'Often':3};
        let keys=['ess_read','ess_afternoon','ess_tv','ess_public','ess_car','ess_afternoon_rest','ess_talk','ess_lunch','ess_traffic'];
        return keys.reduce((sum,k)=> sum + (scoreMap[responses[k]]||0), 0);
    }
    function computeISI(responses) {
        let scoreMap={'无':0,'轻度':1,'中度':2,'重度':3,'极重度':4,'非常满意':0,'满意':1,'一般':2,'不满意':3,'非常不满意':4,'轻微':1,'中等':2,'很大':3,'极严重':4};
        let keys=['isi_onset','isi_maintain','isi_early','isi_satisfy','isi_impact','isi_worry','isi_interfere'];
        return keys.reduce((sum,k)=> sum + (scoreMap[responses[k]]||0), 0);
    }
    function getTendencies(responses, psqi, ess, isi, lang) {
        let tendA = (psqi>7)?(lang==='zh'?'入睡准备期偏长':'Long sleep onset latency'):(lang==='zh'?'正常':'Normal');
        let tendB = (responses.q_wake_night && (responses.q_wake_night.includes('≥3')||responses.q_wake_night==='≥3x/week'))?(lang==='zh'?'夜间易醒敏感':'Night awakening sensitivity'):(lang==='zh'?'夜间稳定性尚可':'Night stability OK');
        let tendC = (responses.q_day_dys && (responses.q_day_dys.includes('≥3')||responses.q_day_dys==='≥3x/week'))?(lang==='zh'?'日间精力恢复偏慢':'Slow daytime recovery'):(lang==='zh'?'日间精力尚可':'Daytime energy OK');
        let tendD = (responses.q_meds && (responses.q_meds.includes('≥3')||responses.q_meds==='≥3x/week'))?(lang==='zh'?'睡眠呼吸干扰风险可能':'Possible sleep breathing risk'):(lang==='zh'?'无明显呼吸风险迹象':'No obvious breathing risk');
        return [tendA,tendB,tendC,tendD];
    }

    // 动态产品读取 (预留Airtable)
    async function fetchProductsFromAirtable() {
        const AIRTABLE_BASE_ID = "YOUR_BASE_ID";      // 替换为实际
        const AIRTABLE_TABLE_NAME = "products";
        const AIRTABLE_TOKEN = "YOUR_PAT_TOKEN";
        if (AIRTABLE_BASE_ID === "YOUR_BASE_ID") {
            return [
                { name: "7天睡眠课程", points: 200 },
                { name: "4型辨证卡片", points: 150 },
                { name: "3段情绪音频", points: 100 }
            ];
        }
        try {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`;
            const resp = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
            const json = await resp.json();
            if (json.records) return json.records.map(r => ({ name: r.fields.name, points: r.fields.points }));
        } catch(e){ console.warn(e); }
        return [];
    }

    // 全局变量
    let currentLang = 'zh';
    let currentPhoneHash = '';
    let currentPoints = 0;
    let submittedFlag = false;
    let productsList = [];
    const apiEndpoint = "https://script.google.com/macros/s/AKfycbwUEFEIuUfw4SuuOJUux06vH3r570jWd00coWZnF3XNu-FgSriUGDL0uZRFPmWFeoEoMQ/exec";

    function t(key) { return translations[currentLang][key] || key; }

    async function refreshPointsAndHistory() {
        if (!currentPhoneHash) return;
        currentPoints = getUserPoints(currentPhoneHash);
        const pointsDiv = document.getElementById('pointsDisplay');
        if(pointsDiv) pointsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
        const historyDiv = document.getElementById('exchangeHistoryDiv');
        if(historyDiv){
            let history = getExchangeHistory(currentPhoneHash);
            historyDiv.innerHTML = `<strong>${t('exchange_history')}</strong><br>` + (history.length?history.slice(-5).map(h=>`${h.product} (${h.points} pts) - ${new Date(h.time).toLocaleString()}`).join('<br>'):t('no_history'));
        }
        const historyBtn = document.getElementById('viewHistoryBtn');
        if(historyBtn) historyBtn.style.display = 'inline-block';
    }

    function showHistoryReports() {
        if(!currentPhoneHash){ alert(t('phone_label')+' '+(currentLang==='zh'?'请先登录':'Please login')); return; }
        let reports = getReportHistory(currentPhoneHash);
        let html = `<h3>${t('history_title')}</h3><div class="report-list">`;
        if(reports.length===0) html += `<p>${t('no_history')}</p>`;
        else {
            reports.slice().reverse().forEach((rep, idx)=>{
                let date = new Date(rep.timestamp).toLocaleString();
                html += `<div class="report-list-item" data-index="${idx}">📅 ${date} - PSQI:${rep.psqi} ESS:${rep.ess} ISI:${rep.isi}</div>`;
            });
        }
        html += `</div><button id="closeHistoryBtn" class="secondary">${t('back_to_home')}</button>`;
        document.getElementById('dynamic-content').innerHTML = html;
        document.querySelectorAll('.report-list-item').forEach(el=>{
            el.addEventListener('click',()=>{
                let idx = parseInt(el.dataset.index);
                let rep = reports.slice().reverse()[idx];
                showReport(rep.psqi, rep.ess, rep.isi, [rep.tendencyA,rep.tendencyB,rep.tendencyC,rep.tendencyD], '');
            });
        });
        document.getElementById('closeHistoryBtn').addEventListener('click',()=>renderQuestionnaire());
    }

    async function renderQuestionnaire() {
        productsList = await fetchProductsFromAirtable();
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>`;
        html += `<div style="background:#f0e7dd; padding:16px; border-radius:28px; margin-bottom:20px;">
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                        <input type="tel" id="phoneInput" placeholder="${t('phone_label')}" style="flex:2; min-width:150px;" aria-label="${t('phone_label')}">
                        <button id="loginBtn" style="flex:0;">${t('login_btn')}</button>
                        <button id="viewHistoryBtn" style="display:none; background:#e2d5c8; color:#5e4b3c;">${t('view_history')}</button>
                    </div>
                    <div id="pointsDisplay" class="points-balance">${t('points_balance')}: ${currentPoints}</div>
                    <div class="info-banner">${t('info_health365')}</div>
                </div>`;
        html += `<div class="consent-box">
                    <label><input type="checkbox" id="consentCheck" /> ${t('consent_text')}</label><br/>
                    <label><input type="checkbox" id="rweCheck" /> ${t('rwe_label')}</label>
                 </div>`;
        const questions = getLocalizedQuestions(currentLang);
        questions.forEach((q, idx) => {
            html += `<div class="question"><div class="question-text" id="q_label_${idx}">${idx+1}. ${q.text}</div>`;
            if (q.type === 'number') {
                html += `<input type="number" id="q_${q.key}" placeholder="${t('age')}" aria-labelledby="q_label_${idx}">`;
            } else if (q.type === 'select' && q.options) {
                html += `<select id="q_${q.key}" aria-labelledby="q_label_${idx}"><option value="">-- ${currentLang==='zh'?'请选择':'Select'} --</option>`;
                q.options.forEach(opt => { html += `<option>${opt}</option>`; });
                html += `</select>`;
            } else if (q.type === 'time') {
                html += `<input type="time" id="q_${q.key}" aria-labelledby="q_label_${idx}">`;
            } else {
                html += `<input type="text" id="q_${q.key}" placeholder="${q.text}" aria-labelledby="q_label_${idx}">`;
            }
            html += `</div>`;
        });
        html += `<div class="btn-group"><button id="submitSurveyBtn">${t('submit_btn')}</button></div>`;
        html += `<div class="shop-section"><h3>${t('shop_title')}</h3>`;
        for(let p of productsList){
            html += `<div class="product-item">
                        <span class="product-name">${p.name}</span>
                        <span class="product-points">${p.points} ${currentLang==='zh'?'积分':'pts'}</span>
                        <button class="exchange-btn" data-product-name="${p.name}" data-points="${p.points}">${currentLang==='zh'?'兑换':'Exchange'}</button>
                    </div>`;
        }
        html += `<div id="exchangeHistoryDiv" class="history-log"></div>`;
        html += `</div>`;
        // B端预留区块
        html += `<div class="b2b-section">
                    <a href="#" id="bizCoopBtn" class="b2b-link">${t('b2b_coop')}</a>
                    <a href="#" id="dataInsightBtn" class="b2b-link">${t('b2b_data')}</a>
                    <a href="#" id="hotelCertBtn" class="b2b-link">${t('b2b_hotel')}</a>
                    <a href="#" id="adminLoginBtn" class="b2b-link admin-link">${t('b2b_admin')}</a>
                </div>`;
        document.getElementById('dynamic-content').innerHTML = html;

        // 绑定事件
        document.getElementById('loginBtn').addEventListener('click', async () => {
            let phoneRaw = document.getElementById('phoneInput').value.trim();
            if(!phoneRaw){ alert(t('phone_label')+' '+(currentLang==='zh'?'不能为空':'required')); return; }
            currentPhoneHash = await sha256(phoneRaw);
            currentPoints = getUserPoints(currentPhoneHash);
            document.getElementById('pointsDisplay').innerText = `${t('points_balance')}: ${currentPoints}`;
            await refreshPointsAndHistory();
            document.getElementById('viewHistoryBtn').style.display = 'inline-block';
        });
        document.getElementById('submitSurveyBtn').addEventListener('click', () => submitSurvey());
        document.getElementById('viewHistoryBtn')?.addEventListener('click', () => showHistoryReports());
        document.querySelectorAll('.exchange-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if(!currentPhoneHash){ alert(t('phone_label')+' '+(currentLang==='zh'?'请先登录':'Please login')); return; }
                let prodName = btn.getAttribute('data-product-name');
                let points = parseInt(btn.getAttribute('data-points'));
                if(deductPoints(currentPhoneHash, points)){
                    currentPoints = getUserPoints(currentPhoneHash);
                    document.getElementById('pointsDisplay').innerText = `${t('points_balance')}: ${currentPoints}`;
                    addExchangeRecord(currentPhoneHash, prodName, points);
                    alert(t('exchange_success'));
                    await refreshPointsAndHistory();
                } else { alert(t('exchange_fail_points')); }
            });
        });
        // B端预留事件
        document.getElementById('bizCoopBtn')?.addEventListener('click', (e) => { e.preventDefault(); alert("企业合作通道即将开放，请联系 partnership@aromasune.com 或等待正式上线。"); });
        document.getElementById('dataInsightBtn')?.addEventListener('click', (e) => { e.preventDefault(); alert("当前已有 1,280+ 用户完成评估，PSQI 平均分 9.2。详细报告请联系数据团队。"); });
        document.getElementById('hotelCertBtn')?.addEventListener('click', (e) => { e.preventDefault(); alert("酒店星级认证体系 2.0 即将推出，请关注后续通知。"); });
        document.getElementById('adminLoginBtn')?.addEventListener('click', (e) => { e.preventDefault(); window.open('https://admin.aromasune.com', '_blank'); });
    }

    async function submitSurvey() {
        if(submittedFlag) return;
        try{
            const consent = document.getElementById('consentCheck')?.checked;
            if(!consent){ alert(t('consent_text')+(currentLang==='zh'?' 请勾选同意':' Please consent')); return; }
            if(!currentPhoneHash){ alert(t('phone_label')+' '+(currentLang==='zh'?'请先登录':'Please login')); return; }
            const questions = getLocalizedQuestions(currentLang);
            let responses = {};
            for(let q of questions){
                let el = document.getElementById(`q_${q.key}`);
                if(el) responses[q.key] = el.value;
            }
            let alreadyCompleted = hasCompletedSurvey(currentPhoneHash);
            let pointsEarned = 0;
            if(!alreadyCompleted){
                addPoints(currentPhoneHash, 100);
                currentPoints = getUserPoints(currentPhoneHash);
                pointsEarned = 100;
                markCompletedSurvey(currentPhoneHash);
                const ptsDiv = document.getElementById('pointsDisplay');
                if(ptsDiv) ptsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
            }
            let psqi = computePSQI(responses);
            let ess = computeESS(responses);
            let isi = computeISI(responses);
            let tendencies = getTendencies(responses, psqi, ess, isi, currentLang);
            addReportRecord(currentPhoneHash, { psqi, ess, isi, tendencyA:tendencies[0], tendencyB:tendencies[1], tendencyC:tendencies[2], tendencyD:tendencies[3], rawResponses: responses });
            const payload = { phoneHash: currentPhoneHash, ...responses, psqi_total:psqi, ess_total:ess, isi_total:isi, tendencyA:tendencies[0], tendencyB:tendencies[1], tendencyC:tendencies[2], tendencyD:tendencies[3], points_earned:pointsEarned, language:currentLang, timestamp:new Date().toISOString() };
            fetch(apiEndpoint, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }).catch(e=>console.warn);
            submittedFlag = true;
            let msgHtml = pointsEarned ? `<div style="background:#d9e6c3; padding:10px; border-radius:20px; margin-bottom:16px;">✨ ${t('points_earned')} (${pointsEarned})</div>` : '';
            showReport(psqi, ess, isi, tendencies, msgHtml);
        } catch(err){ console.error(err); alert("提交出错："+err.message); }
    }

    function showReport(psqi, ess, isi, tendencies, msgHtml) {
        let gradeText = psqi<=5 ? (currentLang==='zh'?'良好':'Good') : (currentLang==='zh'?'需关注':'Needs attention');
        let reportUrl = window.location.href;
        let html = `<h1>${t('title')}</h1>${msgHtml}<div id="reportCapture" class="report-section">
                    <div class="score-card"><div class="flex-row"><strong>PSQI ${t('score_label')}: ${psqi}</strong><span class="badge">${gradeText}</span></div></div>
                    <div class="score-card"><strong>ESS ${t('score_label')}: ${ess}</strong> (0-24)</div>
                    <div class="score-card"><strong>ISI ${t('score_label')}: ${isi}</strong> (0-28)</div>
                    <h3>${t('tendency_label')}</h3>
                    <ul><li>${tendencies[0]}</li><li>${tendencies[1]}</li><li>${tendencies[2]}</li><li>${tendencies[3]}</li></ul>
                    <div class="legal-note">${t('medical_disclaimer')}<br/>${t('ant_chain')}</div>
                  </div>
                  <div class="share-buttons">
                    <button id="shareWA" class="share-btn">${t('share_whatsapp')}</button>
                    <button id="shareFB" class="share-btn fb">${t('share_facebook')}</button>
                    <button id="shareWechat" class="share-btn wechat">${t('share_wechat')}</button>
                    <button id="copyLink" class="share-btn copy">${t('copy_link')}</button>
                    <button id="saveImg" class="share-btn save-img">${t('save_image')}</button>
                  </div>
                  <button id="restartBtn" class="secondary" style="margin-top:20px;">${t('back_to_home')}</button>`;
        document.getElementById('dynamic-content').innerHTML = html;
        document.getElementById('shareWA').onclick = () => { window.open(`https://wa.me/?text=${encodeURIComponent(reportUrl)}`); };
        document.getElementById('shareFB').onclick = () => { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(reportUrl)}`); };
        document.getElementById('shareWechat').onclick = () => { alert("请点击右上角菜单选择「发送给朋友」分享到微信。"); };
        document.getElementById('copyLink').onclick = () => { navigator.clipboard.writeText(reportUrl); alert(t('copy_success')); };
        document.getElementById('saveImg').onclick = () => { html2canvas(document.getElementById('reportCapture')).then(canvas=>{ let a=document.createElement('a'); a.download='sleep_report.png'; a.href=canvas.toDataURL(); a.click(); }); };
        document.getElementById('restartBtn').onclick = () => location.reload();
    }

    function setLanguage(lang) {
        currentLang = lang;
        renderQuestionnaire();
        document.querySelectorAll('.lang-btn').forEach(btn => { if(btn.dataset.lang===lang) btn.classList.add('active'); else btn.classList.remove('active'); });
    }

    function init() {
        renderQuestionnaire();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click',()=>setLanguage(btn.dataset.lang)));
    }
    init();
</script>
