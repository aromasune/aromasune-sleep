<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ 睡眠健康评估</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5efe7; margin: 0; padding: 20px; color: #2c2a29; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 6px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #5e4b3c; }
        .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }
        h1 { font-size: 1.8rem; font-weight: 500; margin: 0 0 8px; color: #5e2e1c; }
        .sub { color: #7e6a5c; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; }
        .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
        select, input[type="number"], input[type="time"], input[type="tel"] { padding: 8px 12px; border-radius: 24px; border: 1px solid #ddd0c0; background: #fffaf5; width: 100%; max-width: 280px; }
        .btn-group, .external-buttons { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        button { background: #b99470; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; flex: 1; }
        button.secondary { background: #e2d5c8; color: #5e4b3c; }
        .external-btn { background: #2e7d32; padding: 14px; text-align: center; text-decoration: none; display: inline-block; color: white; border-radius: 40px; flex: 1; }
        .external-btn.fairprice { background: #1e3a8a; }
        .points-balance { font-size: 1.4rem; font-weight: bold; text-align: center; background: #fff0e0; border-radius: 40px; padding: 8px; margin: 16px 0; }
        .info-banner { background: #e6f4ea; border-left: 4px solid #2e7d32; padding: 10px 16px; border-radius: 20px; margin: 12px 0; font-size: 13px; }
        .consent-box { background: #f9f3ec; padding: 12px; border-radius: 16px; margin: 20px 0; }
        .verification-row { display: flex; gap: 10px; margin-top: 10px; }
        @media (max-width: 550px) { .verification-row { flex-direction: column; } .btn-group, .external-buttons { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" data-lang="ms" onclick="setLanguage('ms')">Bahasa Melayu</button>
        <button class="lang-btn" data-lang="id" onclick="setLanguage('id')">Indonesia</button>
    </div>
    <div id="dynamic-content"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwWY5ObicdwLdcy99rcbiq2_5sxsYb2bwDuDHd7tDTYMnjKZMZzroCnqfqj1OiXW-dymg/exec";
    let authToken = null;
    let currentPhoneHash = null;
    let currentPoints = 0;
    let currentLang = 'zh';

    const translations = {
        zh: { phone_label: "手机号", verify_code: "验证码", send_code: "发送验证码", login_btn: "登录", submit_btn: "提交并查看报告", points_balance: "我的积分", info_health365: "✨ 积分可在Health365抵扣保费，也可在FairPrice消费。", consent_text: "我已阅读并同意数据隐私条款", rwe_label: "我同意将匿名数据用于RWE研究", back_to_home: "重新评估", age: "年龄", menopause: "绝经状态", menopause_op1: "未绝经", menopause_op2: "围绝经期", menopause_op3: "已绝经" },
        en: { phone_label: "Mobile number", verify_code: "Verification code", send_code: "Send code", login_btn: "Login", submit_btn: "Submit & View Report", points_balance: "My Points", info_health365: "✨ Points can offset MediShield Life premium (150 pts ≈ SGD 2) or spend at FairPrice.", consent_text: "I have read and agree to the privacy policy.", rwe_label: "I agree to share anonymized data for RWE.", back_to_home: "New Assessment", age: "Age", menopause: "Menopause status", menopause_op1: "Pre-menopause", menopause_op2: "Peri-menopause", menopause_op3: "Post-menopause" }
    };
    for (let l of ['ms','id']) if (!translations[l]) translations[l] = translations['en'];

    function t(key) { return translations[currentLang]?.[key] || key; }

    async function sendCode() {
        const phone = document.getElementById('phone').value;
        if (!phone) return alert('请输入手机号');
        const res = await fetch(`${API}?action=sendCode&phone=${phone}`);
        const data = await res.json();
        alert(data.message);
    }

    async function doLogin() {
        const phone = document.getElementById('phone').value;
        const code = document.getElementById('code').value;
        const res = await fetch(`${API}?action=verify&phone=${phone}&code=${code}`);
        const data = await res.json();
        if (data.status === 'success') {
            authToken = data.token;
            currentPhoneHash = data.phoneHash;
            await loadPoints();
            alert('登录成功');
            showQuestionnaire();
        } else {
            alert('验证码错误');
        }
    }

    async function loadPoints() {
        if (!authToken) return;
        const res = await fetch(`${API}?action=points`, {
            headers: { 'Authorization': 'Bearer ' + authToken }
        });
        const data = await res.json();
        currentPoints = data.points || 0;
        const ptsDiv = document.getElementById('pointsDisplay');
        if (ptsDiv) ptsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
    }

    async function submitSurvey() {
        if (!authToken) { alert('请先登录'); return; }
        const consent = document.getElementById('consentCheck')?.checked;
        if (!consent) { alert(t('consent_text')); return; }
        const payload = {
            phoneHash: currentPhoneHash,
            age: document.getElementById('age').value || 0,
            menopause: document.getElementById('menopause').value,
            points_earned: 100,
            language: currentLang
        };
        const res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.status === 'success') {
            currentPoints = data.points_balance;
            alert('提交成功！积分：' + currentPoints);
            showQuestionnaire();
        } else {
            alert('提交失败：' + data.message);
        }
    }

    function showLogin() {
        document.getElementById('dynamic-content').innerHTML = `
            <h1>AROMA SUNÉ 睡眠与情绪健康评估</h1>
            <div class="sub">基于PSQI/ESS/ISI国际量表，非医疗诊断</div>
            <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
                <input type="tel" id="phone" placeholder="${t('phone_label')}" style="width:100%; margin-bottom:10px;">
                <div class="verification-row">
                    <input type="text" id="code" placeholder="${t('verify_code')}" style="flex:2;">
                    <button style="flex:1;" onclick="sendCode()">${t('send_code')}</button>
                </div>
                <button style="width:100%; margin-top:10px;" onclick="doLogin()">${t('login_btn')}</button>
                <div id="pointsDisplay" class="points-balance">${t('points_balance')}: 0</div>
                <div class="info-banner">${t('info_health365')}</div>
            </div>
            <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent_text')}</label><br>
            <label><input type="checkbox" id="rweCheck"> ${t('rwe_label')}</label></div>
        `;
    }

    function showQuestionnaire() {
        document.getElementById('dynamic-content').innerHTML = `
            <h1>AROMA SUNÉ 睡眠与情绪健康评估</h1>
            <div class="sub">基于PSQI/ESS/ISI国际量表，非医疗诊断</div>
            <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
                <div id="pointsDisplay" class="points-balance">${t('points_balance')}: ${currentPoints}</div>
                <button class="secondary" onclick="showLogin()">${t('back_to_home')}</button>
            </div>
            <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent_text')}</label><br>
            <label><input type="checkbox" id="rweCheck"> ${t('rwe_label')}</label></div>
            <div class="question"><div>${t('age')}</div><input type="number" id="age"></div>
            <div class="question"><div>${t('menopause')}</div>
                <select id="menopause"><option>${t('menopause_op1')}</option><option>${t('menopause_op2')}</option><option>${t('menopause_op3')}</option></select>
            </div>
            <div class="btn-group"><button onclick="submitSurvey()">${t('submit_btn')}</button></div>
            <div class="external-buttons">
                <a href="https://www.healthhub.sg/programmes/health365" target="_blank" class="external-btn">Health365</a>
                <a href="https://www.fairprice.com.sg/earn-and-redeem-linkpoints/" target="_blank" class="external-btn fairprice">FairPrice</a>
            </div>
        `;
        loadPoints();
    }

    function setLanguage(lang) {
        currentLang = lang;
        if (authToken) showQuestionnaire(); else showLogin();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }

    showLogin();
</script>
</body>
</html>
