<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ 睡眠健康评估</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5efe7; margin: 0; padding: 20px; color: #2c2a29; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 6px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #5e4b3c; }
        .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }
        h1 { font-size: 1.8rem; font-weight: 500; margin: 0 0 8px; color: #5e2e1c; }
        .sub { color: #7e6a5c; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; }
        .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
        select, input[type="number"], input[type="time"], input[type="tel"] { padding: 8px 12px; border-radius: 24px; border: 1px solid #ddd0c0; background: #fffaf5; width: 100%; max-width: 280px; }
        .btn-group, .external-buttons { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        button { background: #b99470; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; flex: 1; }
        button.secondary { background: #e2d5c8; color: #5e4b3c; }
        .points-balance { font-size: 1.4rem; font-weight: bold; text-align: center; background: #fff0e0; border-radius: 40px; padding: 8px; margin: 16px 0; }
        .info-banner { background: #e6f4ea; border-left: 4px solid #2e7d32; padding: 10px 16px; border-radius: 20px; margin: 12px 0; font-size: 13px; }
        .consent-box { background: #f9f3ec; padding: 12px; border-radius: 16px; margin: 20px 0; }
        .verification-row { display: flex; gap: 10px; margin-top: 10px; }
        @media (max-width: 550px) { .verification-row { flex-direction: column; } .btn-group, .external-buttons { flex-direction: column; } }
        .b2b-section { margin-top: 30px; text-align: center; font-size: 13px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .b2b-link { color: #b99470; text-decoration: none; }
        .error-marker { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; padding: 8px 12px; border-radius: 8px; margin: 10px 0; font-size: 13px; display: none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中文</button>
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" data-lang="ms" onclick="setLanguage('ms')">Bahasa Melayu</button>
        <button class="lang-btn" data-lang="id" onclick="setLanguage('id')">Indonesia</button>
    </div>
    <div id="dynamic-content"></div>
    <div class="b2b-section">
        <a href="#" class="b2b-link" onclick="showBusinessPortal()">🏢 企业合作</a>
        <a href="#" class="b2b-link" onclick="showDataInsights()">📊 数据洞察</a>
        <a href="#" class="b2b-link" onclick="showPartnerLogin()">🔐 合作伙伴登录</a>
    </div>
</div>

<script>
    // ======================= 后端地址 ========================
    const BACKEND = "https://script.google.com/macros/s/AKfycbxhfJAeYFmMLX4LCkQDhCvye-EyXgxi8dVWoFvTTXuy6JpWt86VtojBHWu_e0GnQ2Z0Ag/exec";
    // 使用 CORS 代理（仅用于测试，解决跨域问题）
    const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";
    const USE_PROXY = true;  // 如果遇到网络错误，可以改为 false 尝试直连
    
    // ======================= 全局变量 ========================
    let authToken = null;
    let currentPhoneHash = null;
    let currentPoints = 0;
    let currentLang = 'zh';
    
    // ======================= 多语言翻译（精简版，保留核心）=======================
    const translations = {
        zh: { title: "AROMA SUNÉ 睡眠与情绪健康评估", subtitle: "基于PSQI/ESS/ISI国际量表，非医疗诊断", phone: "手机号", send_code: "发送验证码", verify_code: "验证码", login: "登录", consent: "我已阅读并同意数据隐私条款", rwe: "我同意将匿名数据用于RWE研究", submit: "提交并查看报告", points: "我的积分", info: "✨ 积分可在Health365抵扣保费，也可在FairPrice消费。", back: "重新评估", age: "您的年龄？", menopause: "绝经状态", meno1: "未绝经", meno2: "围绝经期", meno3: "已绝经",
            q1: "1. 您如何评价自己的睡眠质量？", q2: "2. 通常几点上床睡觉？", q3: "3. 躺下后多久才能入睡？（分钟）", q4: "4. 通常几点起床？", q5: "5. 实际睡眠时长？（小时）", q6: "6. 睡眠效率评估", q7: "7. 入睡困难频率", q8: "8. 夜间醒来频率", q9: "9. 使用助眠药物频率", q10: "10. 日间困倦频率",
            ess1: "11. 坐着阅读时会打瞌睡吗？", ess2: "12. 看电视时会打瞌睡吗？", ess3: "13. 在公共场所坐着不动时会打瞌睡吗？", ess4: "14. 连续乘车1小时会打瞌睡吗？", ess5: "15. 下午躺下休息时会打瞌睡吗？", ess6: "16. 坐着与人交谈时会打瞌睡吗？", ess7: "17. 午餐后静坐时会打瞌睡吗？", ess8: "18. 堵车停车时会打瞌睡吗？",
            isi1: "19. 入睡困难程度", isi2: "20. 睡眠维持困难", isi3: "21. 早醒问题", isi4: "22. 对睡眠满意度", isi5: "23. 睡眠问题影响程度", isi6: "24. 他人是否注意到", isi7: "25. 对睡眠的担忧程度",
            opt1: "非常好", opt2: "较好", opt3: "较差", opt4: "非常差", opt_never: "从不", opt_weekly: "<1次/周", opt_twice: "1-2次/周", opt_often: "≥3次/周", opt_ess0: "从不", opt_ess1: "很少", opt_ess2: "有时", opt_ess3: "经常", opt_isi0: "无", opt_isi1: "轻度", opt_isi2: "中度", opt_isi3: "重度", opt_isi4: "极重度" },
        en: { title: "AROMA SUNÉ Sleep & Mood Assessment", subtitle: "Based on PSQI/ESS/ISI. Not a medical diagnosis.", phone: "Mobile", send_code: "Send Code", verify_code: "Code", login: "Login", consent: "I agree to the privacy policy", rwe: "I agree to share anonymized data for RWE", submit: "Submit & View Report", points: "My Points", info: "✨ Points for Health365 & FairPrice", back: "New Assessment", age: "Your age?", menopause: "Menopause Status", meno1: "Pre", meno2: "Peri", meno3: "Post",
            q1: "1. Sleep quality?", q2: "2. Bedtime?", q3: "3. Sleep latency (min)?", q4: "4. Wake time?", q5: "5. Sleep hours?", q6: "6. Sleep efficiency", q7: "7. Difficulty falling asleep", q8: "8. Wake at night", q9: "9. Sleep medication", q10: "10. Daytime dysfunction",
            ess1: "11. Reading", ess2: "12. Watching TV", ess3: "13. Sitting in public", ess4: "14. As passenger", ess5: "15. Lying down afternoon", ess6: "16. Sitting talking", ess7: "17. After lunch", ess8: "18. Stuck in traffic",
            isi1: "19. Fall asleep", isi2: "20. Stay asleep", isi3: "21. Wake early", isi4: "22. Satisfaction", isi5: "23. Impact daily life", isi6: "24. Noticeable", isi7: "25. Worry",
            opt1: "Very good", opt2: "Fairly good", opt3: "Fairly bad", opt4: "Very bad", opt_never: "Never", opt_weekly: "<1x/week", opt_twice: "1-2x/week", opt_often: "≥3x/week", opt_ess0: "Never", opt_ess1: "Slight", opt_ess2: "Moderate", opt_ess3: "High", opt_isi0: "None", opt_isi1: "Mild", opt_isi2: "Moderate", opt_isi3: "Severe", opt_isi4: "Very Severe" }
    };
    translations['ms'] = translations['en'];
    translations['id'] = translations['en'];
    function t(key) { return translations[currentLang][key] || key; }
    
    // ======================= API 调用（支持 CORS 代理）=======================
    async function apiRequest(path, options = {}) {
        let url = path;
        if (USE_PROXY && !path.includes('/macros/')) {
            // 对非代理请求使用代理
            url = CORS_PROXY + path;
        }
        const response = await fetch(url, options);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        return await response.json();
    }
    
    async function callApi(params, options = {}) {
        let url = BACKEND;
        if (params) url += '?' + new URLSearchParams(params).toString();
        const fetchOptions = {
            headers: options.token ? { 'Authorization': 'Bearer ' + options.token } : {},
            ...options
        };
        const response = await fetch(url, fetchOptions);
        return await response.json();
    }
    
    async function callPostApi(data, token) {
        const targetUrl = BACKEND;
        const fetchUrl = USE_PROXY ? CORS_PROXY + targetUrl : targetUrl;
        try {
            const response = await fetch(fetchUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
            }
            return await response.json();
        } catch (error) {
            console.error('POST 请求失败:', error);
            throw error;
        }
    }
    
    async function sendCode() {
        const phone = document.getElementById('phoneInput').value.trim();
        if (!phone) return alert('请输入手机号');
        try {
            const data = await callApi({ action: 'sendCode', phone });
            alert(data.message);
        } catch(e) {
            alert('发送失败: ' + e.message);
        }
    }
    
    async function doLogin() {
        const phone = document.getElementById('phoneInput').value.trim();
        const code = document.getElementById('codeInput').value.trim();
        if (!phone || !code) return alert('请输入手机号和验证码');
        try {
            const data = await callApi({ action: 'verify', phone, code });
            if (data.status === 'success') {
                authToken = data.token;
                currentPhoneHash = data.phoneHash;
                await loadPoints();
                alert('登录成功');
                renderQuestionnaire();
            } else {
                alert('验证码错误');
            }
        } catch(e) {
            alert('登录失败: ' + e.message);
        }
    }
    
    async function loadPoints() {
        if (!authToken) return;
        try {
            const data = await callApi({ action: 'points' }, { token: authToken });
            currentPoints = data.points || 0;
            const ptsDiv = document.getElementById('pointsDisplay');
            if (ptsDiv) ptsDiv.innerText = `${t('points')}: ${currentPoints}`;
        } catch(e) { console.warn(e); }
    }
    
    async function submitSurvey() {
        if (!authToken) return alert('请先登录');
        const consent = document.getElementById('consentCheck')?.checked;
        if (!consent) return alert(t('consent'));
        
        const data = {
            language: currentLang,
            points_earned: 100,
            timestamp: new Date().toISOString(),
            age: parseInt(document.getElementById('age')?.value) || 0,
            menopause: document.getElementById('menopause')?.value || '',
            sleep_quality: document.getElementById('sleep_quality')?.value || '',
            q_bedtime: document.getElementById('q_bedtime')?.value || '',
            q_latency_min: parseInt(document.getElementById('q_latency_min')?.value) || 0,
            q_waketime: document.getElementById('q_waketime')?.value || '',
            q_sleep_hours: parseFloat(document.getElementById('q_sleep_hours')?.value) || 0,
            q_efficiency: document.getElementById('q_efficiency')?.value || '',
            q_difficulty_sleep: document.getElementById('q_difficulty_sleep')?.value || '',
            q_wake_night: document.getElementById('q_wake_night')?.value || '',
            q_meds: document.getElementById('q_meds')?.value || '',
            q_day_dys: document.getElementById('q_day_dys')?.value || '',
            ess_read: document.getElementById('ess_read')?.value || '',
            ess_afternoon: document.getElementById('ess_afternoon')?.value || '',
            ess_tv: document.getElementById('ess_tv')?.value || '',
            ess_public: document.getElementById('ess_public')?.value || '',
            ess_car: document.getElementById('ess_car')?.value || '',
            ess_afternoon_rest: document.getElementById('ess_afternoon_rest')?.value || '',
            ess_talk: document.getElementById('ess_talk')?.value || '',
            ess_lunch: document.getElementById('ess_lunch')?.value || '',
            ess_traffic: document.getElementById('ess_traffic')?.value || '',
            isi_onset: document.getElementById('isi_onset')?.value || '',
            isi_maintain: document.getElementById('isi_maintain')?.value || '',
            isi_early: document.getElementById('isi_early')?.value || '',
            isi_satisfy: document.getElementById('isi_satisfy')?.value || '',
            isi_impact: document.getElementById('isi_impact')?.value || '',
            isi_worry: document.getElementById('isi_worry')?.value || '',
            isi_interfere: document.getElementById('isi_interfere')?.value || '',
            psqi_total: 0, ess_total: 0, isi_total: 0
        };
        
        try {
            const result = await callPostApi(data, authToken);
            if (result.status === 'success') {
                alert(`提交成功！积分：${result.points_balance}`);
                await loadPoints();
                renderLogin();
            } else {
                alert('提交失败：' + (result.message || '未知错误'));
            }
        } catch(e) {
            alert('网络错误：' + e.message + '\n请检查控制台(F12)查看详细信息');
        }
    }
    
    // ======================= UI 渲染 ========================
    function renderLogin() {
        document.getElementById('dynamic-content').innerHTML = `
            <h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
            <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
                <input type="tel" id="phoneInput" placeholder="${t('phone')}" style="width:100%; margin-bottom:10px;">
                <div class="verification-row">
                    <input type="text" id="codeInput" placeholder="${t('verify_code')}" style="flex:2;">
                    <button style="flex:1;" onclick="sendCode()">${t('send_code')}</button>
                </div>
                <button style="width:100%; margin-top:10px;" onclick="doLogin()">${t('login')}</button>
                <div id="pointsDisplay" class="points-balance">${t('points')}: 0</div>
                <div class="info-banner">${t('info')}</div>
                <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent')}</label></div>
                <div class="consent-box"><label><input type="checkbox" id="rweCheck"> ${t('rwe')}</label></div>
            </div>
        `;
    }
    
    function renderQuestionnaire() {
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div id="pointsDisplay" class="points-balance">${t('points')}: ${currentPoints}</div>
        <button class="secondary" onclick="renderLogin()">${t('back')}</button>
        <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent')}</label><br>
        <label><input type="checkbox" id="rweCheck"> ${t('rwe')}</label></div>`;
        
        html += `<div class="question"><div>${t('age')}</div><input type="number" id="age"></div>`;
        html += `<div class="question"><div>${t('menopause')}</div><select id="menopause"><option>${t('meno1')}</option><option>${t('meno2')}</option><option>${t('meno3')}</option></select></div>`;
        html += `<div class="question"><div>${t('q1')}</div><select id="sleep_quality"><option>${t('opt1')}</option><option>${t('opt2')}</option><option>${t('opt3')}</option><option>${t('opt4')}</option></select></div>`;
        html += `<div class="question"><div>${t('q2')}</div><input type="time" id="q_bedtime"></div>`;
        html += `<div class="question"><div>${t('q3')}</div><input type="number" id="q_latency_min" placeholder="分钟"></div>`;
        html += `<div class="question"><div>${t('q4')}</div><input type="time" id="q_waketime"></div>`;
        html += `<div class="question"><div>${t('q5')}</div><input type="number" id="q_sleep_hours" step="0.5" placeholder="小时"></div>`;
        html += `<div class="question"><div>${t('q6')}</div><select id="q_efficiency"><option>>85%</option><option>75-84%</option><option>65-74%</option><option><65%</option></select></div>`;
        html += `<div class="question"><div>${t('q7')}</div><select id="q_difficulty_sleep"><option>${t('opt_never')}</option><option>${t('opt_weekly')}</option><option>${t('opt_twice')}</option><option>${t('opt_often')}</option></select></div>`;
        html += `<div class="question"><div>${t('q8')}</div><select id="q_wake_night"><option>${t('opt_never')}</option><option>${t('opt_weekly')}</option><option>${t('opt_twice')}</option><option>${t('opt_often')}</option></select></div>`;
        html += `<div class="question"><div>${t('q9')}</div><select id="q_meds"><option>${t('opt_never')}</option><option>${t('opt_weekly')}</option><option>${t('opt_twice')}</option><option>${t('opt_often')}</option></select></div>`;
        html += `<div class="question"><div>${t('q10')}</div><select id="q_day_dys"><option>${t('opt_never')}</option><option>${t('opt_weekly')}</option><option>${t('opt_twice')}</option><option>${t('opt_often')}</option></select></div>`;
        
        const essIds = ['read','afternoon','tv','public','car','afternoon_rest','talk','lunch','traffic'];
        for(let i=0; i<essIds.length; i++) {
            html += `<div class="question"><div>${t('ess'+(i+1))}</div><select id="ess_${essIds[i]}"><option>${t('opt_ess0')}</option><option>${t('opt_ess1')}</option><option>${t('opt_ess2')}</option><option>${t('opt_ess3')}</option></select></div>`;
        }
        
        const isiIds = ['onset','maintain','early','satisfy','impact','worry','interfere'];
        for(let i=0; i<isiIds.length; i++) {
            html += `<div class="question"><div>${t('isi'+(i+1))}</div><select id="isi_${isiIds[i]}"><option>${t('opt_isi0')}</option><option>${t('opt_isi1')}</option><option>${t('opt_isi2')}</option><option>${t('opt_isi3')}</option><option>${t('opt_isi4')}</option></select></div>`;
        }
        
        html += `<div class="btn-group"><button onclick="submitSurvey()">${t('submit')}</button></div>`;
        html += `<div class="external-buttons"><a href="https://www.healthhub.sg/programmes/health365" target="_blank" class="external-btn">Health365</a><a href="https://www.fairprice.com.sg/" target="_blank" class="external-btn fairprice">FairPrice</a></div>`;
        document.getElementById('dynamic-content').innerHTML = html;
        loadPoints();
    }
    
    function setLanguage(lang) {
        currentLang = lang;
        if (authToken) renderQuestionnaire(); else renderLogin();
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }
    
    function showBusinessPortal() { alert("企业合作功能即将开放"); }
    function showDataInsights() { alert("数据洞察功能即将开放"); }
    function showPartnerLogin() { alert("合作伙伴登录即将开放"); }
    
    window.setLanguage = setLanguage;
    window.sendCode = sendCode;
    window.doLogin = doLogin;
    window.submitSurvey = submitSurvey;
    window.renderLogin = renderLogin;
    window.showBusinessPortal = showBusinessPortal;
    window.showDataInsights = showDataInsights;
    window.showPartnerLogin = showPartnerLogin;
    
    renderLogin();
</script>
</body>
</html>
