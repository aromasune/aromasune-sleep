            id:{'您的年龄？':'Usia Anda?','绝经状态':'Status menopause','过去一个月，您如何评价您的睡眠质量？':'Kualitas tidur Anda?','过去一个月，通常晚上上床时间是几点？':'Waktu tidur biasa','从上床到睡着通常需要多少分钟？':'Menit untuk tidur','通常早上几点起床？':'Waktu bangun','实际每晚睡眠时长（小时）':'Jam tidur','过去一个月，您在床上的睡眠效率大约是多少？':'Efisiensi tidur?','入睡困难（30分钟内不能入睡）发生的频率':'Frekuensi sulit tidur','夜间或清晨易醒的频率':'Frekuensi terbangun','使用助眠药物的频率':'Frekuensi obat tidur','白天嗜睡影响工作/生活的频率':'Mengantuk siang','坐着阅读时会打瞌睡吗？':'Tertidur membaca','在下午安静坐着时会打瞌睡吗？':'Tertidur sore','坐着看电视时会打瞌睡吗？':'Tertidur TV','在公共场所坐着会打瞌睡吗？':'Tertidur umum','连续坐车1小时会打瞌睡吗？':'Tertidur mobil','下午躺下休息时会打瞌睡吗？':'Tertidur berbaring','坐着与人交谈时会打瞌睡吗？':'Tertidur bicara','午餐后静坐时会打瞌睡吗？':'Tertidur setelah makan','开车等红灯时几分钟会打瞌睡吗？':'Tertidur di lampu','入睡困难程度':'Kesulitan tidur','睡眠维持困难程度':'Kesulitan menjaga tidur','早醒问题程度':'Bangun terlalu awal','对当前睡眠模式满意程度':'Kepuasan','睡眠问题对生活质量影响':'Dampak hidup','睡眠问题让您多担忧':'Kekhawatiran','睡眠问题干扰日间功能':'Gangguan siang'}
        };
        const tMap = map[lang]||map.en;
        return baseQuestions.map(q=>{
            let text = tMap[q.text_zh] || q.text_zh;
            let options = q.options_zh ? translateOptions(q.options_zh, lang) : null;
            return {...q, text, options};
        });
    }

    // 计分函数
    function computePSQI(resp) { try{
        let qm={'很好':0,'较好':1,'较差':2,'很差':3}; let c1=qm[resp.sleep_quality]||1;
        let lat=parseInt(resp.q_latency_min)||0; let c2=lat<=15?0:(lat<=30?1:(lat<=60?2:3));
        let hrs=parseFloat(resp.q_sleep_hours)||0; let c3=hrs>=7?0:(hrs>=6?1:(hrs>=5?2:3));
        let c4=0; if(resp.q_bedtime&&resp.q_waketime){
            let [bh,bm]=resp.q_bedtime.split(':').map(Number); let [wh,wm]=resp.q_waketime.split(':').map(Number);
            let inBed=(wh*60+wm)-(bh*60+bm); if(inBed<0) inBed+=1440;
            let eff=(hrs*60/inBed)*100; if(eff>=85)c4=0; else if(eff>=75)c4=1; else if(eff>=65)c4=2; else c4=3;
        }else{ let e=resp.q_efficiency; if(e==='>85%')c4=0; else if(e==='75%-84%')c4=1; else if(e==='65%-74%')c4=2; else c4=3;}
        let freq={'无':0,'<1次/周':1,'1-2次/周':2,'≥3次/周':3}; let diff=freq[resp.q_difficulty_sleep]||0; let wake=freq[resp.q_wake_night]||0;
        let c5=Math.min(3,Math.floor((diff+wake)/2)); let c6=freq[resp.q_meds]||0; let c7=freq[resp.q_day_dys]||0;
        return Math.min(21,c1+c2+c3+c4+c5+c6+c7);
    }catch(e){return 10;}}
    function computeESS(resp){ let m={'从不':0,'很少':1,'有时':2,'经常':3}; let keys=['ess_read','ess_afternoon','ess_tv','ess_public','ess_car','ess_afternoon_rest','ess_talk','ess_lunch','ess_traffic']; return keys.reduce((s,k)=>s+(m[resp[k]]||0),0);}
    function computeISI(resp){ let m={'无':0,'轻度':1,'中度':2,'重度':3,'极重度':4,'非常满意':0,'满意':1,'一般':2,'不满意':3,'非常不满意':4,'轻微':1,'中等':2,'很大':3,'极严重':4}; let keys=['isi_onset','isi_maintain','isi_early','isi_satisfy','isi_impact','isi_worry','isi_interfere']; return keys.reduce((s,k)=>s+(m[resp[k]]||0),0);}
    function getTendencies(resp,psqi,lang){
        let tendA=psqi>7?(lang==='zh'?'入睡准备期偏长':'Long latency'):(lang==='zh'?'正常':'Normal');
        let tendB=resp.q_wake_night?.includes('≥3')?(lang==='zh'?'夜间易醒敏感':'Night sensitivity'):(lang==='zh'?'夜间稳定性尚可':'Stable');
        let tendC=resp.q_day_dys?.includes('≥3')?(lang==='zh'?'日间精力恢复偏慢':'Slow daytime'):(lang==='zh'?'日间精力尚可':'OK');
        let tendD=resp.q_meds?.includes('≥3')?(lang==='zh'?'睡眠呼吸干扰风险可能':'Breathing risk'):(lang==='zh'?'无明显呼吸风险迹象':'No risk');
        return [tendA,tendB,tendC,tendD];
    }

    // 历史报告存储
    const REPORTS_PREFIX='reports_';
    function addReport(phoneHash,data){ let key=REPORTS_PREFIX+phoneHash; let arr=JSON.parse(localStorage.getItem(key)||'[]'); arr.push({...data,timestamp:new Date().toISOString()}); localStorage.setItem(key,JSON.stringify(arr));}
    function getReports(phoneHash){ let key=REPORTS_PREFIX+phoneHash; return JSON.parse(localStorage.getItem(key)||'[]');}

    // ========== 后端 API（使用 CORS 代理）==========
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwG3GXbpyroHZ-5glm4vXGkpgDH-z20CwkixanEvWQvmcg6KnL38ioDdLZig4Rr4Y8_Xw/exec";
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
    const apiEndpoint = PROXY_URL + BACKEND_URL;
    
    let authToken = null, currentPhoneHash = null, currentPoints = 0, currentLang = 'zh', submitting = false;

    function t(key){ return (translations[currentLang]&&translations[currentLang][key])||key; }

    window.sendSmsCode = async function(){
        const phone = document.getElementById('phoneInput').value.trim();
        if(!phone){ alert(t('phone_label')+'不能为空'); return; }
        try{
            const res = await fetch(`${apiEndpoint}?action=sendCode&phone=${encodeURIComponent(phone)}`);
            const data = await res.json();
            alert(data.message || t('code_sent'));
        }catch(e){ alert('网络错误'); }
    };
    window.doLogin = async function(){
        const phone = document.getElementById('phoneInput').value.trim();
        const code = document.getElementById('codeInput').value.trim();
        if(!phone||!code){ alert('请输入手机号和验证码'); return; }
        try{
            const res = await fetch(`${apiEndpoint}?action=verify&phone=${encodeURIComponent(phone)}&code=${code}`);
            const data = await res.json();
            if(data.status==='success'){
                authToken = data.token;
                currentPhoneHash = data.phoneHash;
                if(authToken){
                    alert(t('login_success'));
                    await window.refreshPoints();
                    window.renderQuestionnaire();
                }else{ alert('登录成功但未返回token'); }
            }else{ alert(t('code_error')); }
        }catch(e){ alert('网络错误'); }
    };
    window.refreshPoints = async function(){
        if(!authToken) return;
        try{
            const res = await fetch(`${apiEndpoint}?action=points`, { headers: { 'Authorization': 'Bearer '+authToken } });
            const data = await res.json();
            if(data.points!==undefined) currentPoints = data.points;
            const ptsDiv = document.getElementById('pointsDisplay');
            if(ptsDiv) ptsDiv.innerText = `${t('points_balance')}: ${currentPoints}`;
        }catch(e){ console.warn(e); }
    };
    window.logout = function(){ authToken=null; window.renderLogin(); };
    window.submitSurveyForm = async function(){
        if(submitting) return;
        const consent = document.getElementById('consentCheck')?.checked;
        if(!consent){ alert(t('consent_text')); return; }
        if(!authToken){ alert('请先登录'); return; }
        submitting = true;
        let responses = {};
        const questions = getLocalizedQuestions(currentLang);
        for(let q of questions){
            let el = document.getElementById(`q_${q.key}`);
            if(el) responses[q.key] = el.value;
        }
        let psqi = computePSQI(responses);
        let ess = computeESS(responses);
        let isi = computeISI(responses);
        let tendencies = getTendencies(responses, psqi, currentLang);
        const payload = { phoneHash: currentPhoneHash, ...responses, psqi_total: psqi, ess_total: ess, isi_total: isi, tendencyA: tendencies[0], tendencyB: tendencies[1], tendencyC: tendencies[2], tendencyD: tendencies[3], points_earned: 100, language: currentLang };
        try{
            const res = await fetch(apiEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+authToken }, body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status==='success'){
                currentPoints = result.points_balance;
                const msgHtml = result.added_points ? `<div style="background:#d9e6c3; padding:10px; border-radius:20px;">✨ ${t('points_earned')}</div>` : '';
                addReport(currentPhoneHash, { psqi, ess, isi, tendencies });
                window.showReport(psqi, ess, isi, tendencies, msgHtml);
            }else if(result.error==='limit_exceeded') alert(t('submit_limit'));
            else alert('提交失败：'+(result.message||'未知错误'));
        }catch(e){ alert('网络错误'); }
        submitting = false;
    };
    window.showReport = function(psqi, ess, isi, tendencies, msgHtml){
        let grade = psqi<=5?(currentLang==='zh'?'良好':'Good'):(currentLang==='zh'?'需关注':'Needs attention');
        let url = window.location.href;
        let html = `<h1>${t('title')}</h1>${msgHtml}<div id="reportCapture" class="report-section">
            <div class="score-card"><strong>PSQI ${t('score_label')}: ${psqi}</strong><span class="badge">${grade}</span></div>
            <div class="score-card"><strong>ESS ${t('score_label')}: ${ess}</strong></div>
            <div class="score-card"><strong>ISI ${t('score_label')}: ${isi}</strong></div>
            <h3>${t('tendency_label')}</h3><ul><li>${tendencies[0]}</li><li>${tendencies[1]}</li><li>${tendencies[2]}</li><li>${tendencies[3]}</li></ul>
            <div class="legal-note">${t('medical_disclaimer')}<br>${t('ant_chain')}</div>
        </div>
        <div class="share-buttons">
            <button class="share-btn" onclick="window.open('https://wa.me/?text=${encodeURIComponent(url)}')">${t('share_whatsapp')}</button>
            <button class="share-btn fb" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}')">${t('share_facebook')}</button>
            <button class="share-btn wechat" onclick="alert('请点击右上角菜单选择「发送给朋友」分享到微信。')">${t('share_wechat')}</button>
            <button class="share-btn copy" onclick="navigator.clipboard.writeText('${url}'); alert('${t('copy_link')}')">${t('copy_link')}</button>
            <button class="share-btn" onclick="alert('截图功能需加载html2canvas，请自行添加。')">${t('save_image')}</button>
        </div>
        <button class="secondary" onclick="location.reload()">${t('back_to_home')}</button>`;
        document.getElementById('dynamic-content').innerHTML = html;
    };
    window.renderLogin = function(){
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
            <input type="tel" id="phoneInput" placeholder="${t('phone_label')}" style="width:100%; margin-bottom:10px;">
            <div class="verification-row">
                <input type="text" id="codeInput" placeholder="${t('verify_code')}" style="flex:2;">
                <button style="flex:1;" onclick="window.sendSmsCode()">${t('send_code')}</button>
            </div>
            <button style="width:100%; margin-top:10px;" onclick="window.doLogin()">${t('login_btn')}</button>
            <div id="pointsDisplay" class="points-balance">${t('points_balance')}: 0</div>
            <div class="info-banner">${t('info_health365')}</div>
        </div>
        <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent_text')}</label><br>
        <label><input type="checkbox" id="rweCheck"> ${t('rwe_label')}</label></div>`;
        document.getElementById('dynamic-content').innerHTML = html;
    };
    window.renderQuestionnaire = function(){
        let html = `<h1>${t('title')}</h1><div class="sub">${t('subtitle')}</div>
        <div style="background:#f0e7dd; padding:16px; border-radius:28px;">
            <div id="pointsDisplay" class="points-balance">${t('points_balance')}: ${currentPoints}</div>
            <button class="secondary" onclick="window.logout()">${t('back_to_home')}</button>
        </div>
        <div class="consent-box"><label><input type="checkbox" id="consentCheck"> ${t('consent_text')}</label><br>
        <label><input type="checkbox" id="rweCheck"> ${t('rwe_label')}</label></div>`;
        const questions = getLocalizedQuestions(currentLang);
        questions.forEach((q, idx)=>{
            html += `<div class="question"><div>${idx+1}. ${q.text}</div>`;
            if(q.type==='number') html += `<input type="number" id="q_${q.key}">`;
            else if(q.type==='select'){
                html += `<select id="q_${q.key}"><option value="">-- ${currentLang==='zh'?'请选择':'Select'} --</option>`;
                q.options.forEach(opt=>html+=`<option>${opt}</option>`);
                html += `</select>`;
            }else if(q.type==='time') html += `<input type="time" id="q_${q.key}">`;
            else html += `<input type="text" id="q_${q.key}">`;
            html += `</div>`;
        });
        html += `<div class="btn-group"><button onclick="window.submitSurveyForm()">${t('submit_btn')}</button></div>
        <div class="shop-section"><h3>${t('points_balance')}</h3>
        <div class="external-buttons">
            <a href="https://www.healthhub.sg/programmes/health365" target="_blank" class="external-btn">${t('exchange_health365')}</a>
            <a href="https://www.fairprice.com.sg/earn-and-redeem-linkpoints/" target="_blank" class="external-btn fairprice">${t('exchange_fairprice')}</a>
        </div></div>
        <div class="b2b-section">
            <a href="#" onclick="alert('企业合作通道即将开放，请联系 partnership@aromasune.com'); return false;" class="b2b-link">${t('b2b_coop')}</a>
            <a href="#" onclick="alert('行业数据洞察即将上线，敬请期待。'); return false;" class="b2b-link">${t('b2b_data')}</a>
            <a href="#" onclick="alert('星级认证体系2.0即将推出，请关注通知。'); return false;" class="b2b-link">${t('b2b_hotel')}</a>
            <a href="#" onclick="window.open('https://admin.aromasune.com','_blank'); return false;" class="b2b-link">${t('b2b_admin')}</a>
        </div>`;
        document.getElementById('dynamic-content').innerHTML = html;
        window.refreshPoints();
    };
    window.setLanguage = function(lang){
        currentLang = lang;
        if(authToken) window.renderQuestionnaire(); else window.renderLogin();
        document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang));
    };
    window.renderLogin();
</script>
