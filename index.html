<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ 睡眠健康评估</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5efe7; margin: 0; padding: 20px; color: #2c2a29; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 6px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #5e4b3c; }
        .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }
        h1 { font-size: 1.8rem; font-weight: 500; margin: 0 0 8px; color: #5e2e1c; }
        .sub { color: #7e6a5c; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; }
        .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
        .question-text { font-weight: 500; margin-bottom: 10px; }
        select, input[type="number"], input[type="time"], input[type="tel"] { padding: 8px 12px; border-radius: 24px; border: 1px solid #ddd0c0; background: #fffaf5; width: 100%; max-width: 280px; }
        .btn-group, .external-buttons { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        button { background: #b99470; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; flex: 1; transition: 0.2s; }
        button.secondary { background: #e2d5c8; color: #5e4b3c; }
        .external-btn { background: #2e7d32; padding: 14px; text-align: center; text-decoration: none; display: inline-block; color: white; border-radius: 40px; flex: 1; }
        .external-btn.fairprice { background: #1e3a8a; }
        .points-balance { font-size: 1.4rem; font-weight: bold; text-align: center; background: #fff0e0; border-radius: 40px; padding: 8px; margin: 16px 0; }
        .info-banner { background: #e6f4ea; border-left: 4px solid #2e7d32; padding: 10px 16px; border-radius: 20px; margin: 12px 0; font-size: 13px; }
        .consent-box { background: #f9f3ec; padding: 12px; border-radius: 16px; margin: 20px 0; }
        .share-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .share-btn { background: #25D366; padding: 10px; border-radius: 40px; flex: 1; text-align: center; cursor: pointer; color: white; }
        .share-btn.fb { background: #1877f2; }
        .share-btn.wechat { background: #07c160; }
        .share-btn.copy { background: #5e7a6e; }
        .legal-note { font-size: 11px; text-align: center; margin-top: 24px; border-top: 1px solid #eee0d2; padding-top: 16px; }
        .b2b-section { margin-top: 30px; text-align: center; font-size: 13px; display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .b2b-link { color: #b99470; text-decoration: none; cursor: pointer; }
        .verification-row { display: flex; gap: 10px; margin-top: 10px; }
        @media (max-width: 550px) { .verification-row { flex-direction: column; } .btn-group, .external-buttons { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="lang-bar">
        <button class="lang-btn active" data-lang="zh" onclick="window.setLanguage('zh')">中文</button>
        <button class="lang-btn" data-lang="en" onclick="window.setLanguage('en')">English</button>
        <button class="lang-btn" data-lang="ms" onclick="window.setLanguage('ms')">Bahasa Melayu</button>
        <button class="lang-btn" data-lang="id" onclick="window.setLanguage('id')">Indonesia</button>
    </div>
    <div id="dynamic-content"></div>
</div>

<script>
    // Add latest translations, questions, and logic here
</script>
</body>
</html>
