<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AROMA SUNÉ · 睡眠健康评估</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #faf7f2;
            padding: 20px;
            color: #2c3e2f;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: white;
            border: 1px solid #c0cfb5;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #2d4a3e;
            color: white;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .hero {
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #2a4b3c;
        }
        .btn {
            background: #2d4a3e;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
        }
        .question {
            margin-bottom: 20px;
        }
        .question label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 0.9rem;
        }
        .consent-box {
            background: #faf8f5;
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
        }
        .consent-line {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .report-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
        }
        .disclaimer {
            background: #fff6e8;
            border-left: 4px solid #e6b17e;
            padding: 12px;
            font-size: 0.7rem;
            margin: 20px 0;
        }
        .score-bar {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #b2b9ab;
            margin-top: 20px;
        }
        [data-lang="zh"] .lang-zh, [data-lang="en"] .lang-en, [data-lang="ms"] .lang-ms, [data-lang="id"] .lang-id {
            display: block;
        }
        [data-lang="zh"] .lang-en, [data-lang="zh"] .lang-ms, [data-lang="zh"] .lang-id,
        [data-lang="en"] .lang-zh, [data-lang="en"] .lang-ms, [data-lang="en"] .lang-id,
        [data-lang="ms"] .lang-zh, [data-lang="ms"] .lang-en, [data-lang="ms"] .lang-id,
        [data-lang="id"] .lang-zh, [data-lang="id"] .lang-en, [data-lang="id"] .lang-ms {
            display: none;
        }
    </style>
</head>
<body data-lang="zh">
<div class="container">
    <div class="lang-bar">
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
        <button class="lang-btn" data-lang="ms">Melayu</button>
        <button class="lang-btn" data-lang="id">Indonesia</button>
    </div>

    <!-- 首页 -->
    <div id="homePage">
        <div class="card hero">
            <h1 class="lang-zh">🌙 AROMA SUNÉ</h1>
            <h1 class="lang-en">🌙 AROMA SUNÉ</h1>
            <div class="lang-zh"><p>专注40-60岁女性 · 非药物情绪睡眠健康</p></div>
            <div class="lang-en"><p>Non‑pharmacological sleep & emotional wellness</p></div>
            <div class="lang-zh"><div style="background:#eef3ea; display:inline-block; padding:6px 12px; border-radius:40px; font-size:0.7rem; margin-top:10px;">✓ WSS Member  ✓ WITT  ✓ CIDESCO  ✓ HPB Merchant</div></div>
            <div class="lang-en"><div style="background:#eef3ea; display:inline-block; padding:6px 12px; border-radius:40px; font-size:0.7rem; margin-top:10px;">✓ WSS Member  ✓ WITT  ✓ CIDESCO  ✓ HPB Merchant</div></div>
            <div class="lang-zh"><div class="points-badge" style="background:#2d4a3e; color:white; padding:8px 16px; border-radius:40px; display:inline-block; margin:16px 0;">🎁 完成评估可得 100 HPB 积分</div></div>
            <div class="lang-en"><div class="points-badge" style="background:#2d4a3e; color:white; padding:8px 16px; border-radius:40px; display:inline-block; margin:16px 0;">🎁 Earn 100 HPB points</div></div>
            <button id="startBtn" class="btn">开始睡眠健康评估</button>
        </div>
    </div>

    <!-- 问卷页 -->
    <div id="surveyPage" style="display:none;">
        <div class="card">
            <form id="sleepForm">
                <div class="question"><label>年龄</label><select id="age"><option>40-44</option><option>45-49</option><option>50-54</option><option>55-60</option></select></div>
                <div class="question"><label>绝经状态</label><select id="menopause"><option>绝经前</option><option>围绝经期</option><option>绝经后</option></select></div>
                <div class="question"><label>1. 上床时间</label><input type="time" id="q1" required></div>
                <div class="question"><label>2. 入睡时长</label><select id="q2"><option value="0">≤15分钟</option><option value="1">16-30分钟</option><option value="2">31-60分钟</option><option value="3">>60分钟</option></select></div>
                <div class="question"><label>3. 起床时间</label><input type="time" id="q3" required></div>
                <div class="question"><label>4. 实际睡眠时长</label><select id="q4"><option value="0">>7小时</option><option value="1">6-7小时</option><option value="2">5-6小时</option><option value="3"><5小时</option></select></div>
                <div class="question"><label>5. 睡眠质量自评</label><select id="q5"><option value="0">很好</option><option value="1">尚可</option><option value="2">较差</option><option value="3">很差</option></select></div>
                <div class="question"><label>6. 入睡困难频率</label><select id="q6"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>7. 夜间醒来频率</label><select id="q7"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>8. 起床上厕所频率</label><select id="q8"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>9. 呼吸不畅频率</label><select id="q9"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>10. 咳嗽/打鼾频率</label><select id="q10"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>11. 感觉冷频率</label><select id="q11"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>12. 感觉热频率</label><select id="q12"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>13. 做噩梦频率</label><select id="q13"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>14. 疼痛频率</label><select id="q14"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>15. 其他干扰因素</label><input type="text" id="q15" placeholder="可选"></div>
                <div class="question"><label>16. 安眠药使用频率</label><select id="q16"><option value="0">无</option><option value="1"><1次/周</option><option value="2">1-2次/周</option><option value="3">≥3次/周</option></select></div>
                <div class="question"><label>17. 阅读时打瞌睡</label><select id="ess1"><option value="0">从不</option><option value="1">很少</option><option value="2">有时</option><option value="3">经常</option></select></div>
                <div class="question"><label>18. 交谈时打瞌睡</label><select id="ess2"><option value="0">从不</option><option value="1">很少</option><option value="2">有时</option><option value="3">经常</option></select></div>
                <div class="question"><label>19. 入睡困难严重程度</label><select id="isi1"><option value="0">无</option><option value="1">轻度</option><option value="2">中度</option><option value="3">重度</option><option value="4">极重度</option></select></div>
                <div class="question"><label>20. 夜间维持睡眠困难程度</label><select id="isi2"><option value="0">无</option><option value="1">轻度</option><option value="2">中度</option><option value="3">重度</option><option value="4">极重度</option></select></div>
                <div class="question"><label>21. 早醒问题严重程度</label><select id="isi3"><option value="0">无</option><option value="1">轻度</option><option value="2">中度</option><option value="3">重度</option><option value="4">极重度</option></select></div>
                <div class="question"><label>22. 对当前睡眠模式的满意程度</label><select id="isi4"><option value="0">非常满意</option><option value="1">满意</option><option value="2">中等</option><option value="3">不满意</option><option value="4">非常不满意</option></select></div>
                <div class="question"><label>23. 睡眠问题对生活质量的影响</label><select id="isi5"><option value="0">完全无影响</option><option value="1">轻微</option><option value="2">中等</option><option value="3">明显</option><option value="4">非常明显</option></select></div>
                <div class="question"><label>24. 对睡眠问题的担忧程度</label><select id="isi6"><option value="0">完全不担心</option><option value="1">轻微</option><option value="2">中等</option><option value="3">明显</option><option value="4">非常担心</option></select></div>
                <div class="question"><label>25. 睡眠问题对日常功能的影响</label><select id="isi7"><option value="0">完全无影响</option><option value="1">轻微</option><option value="2">中等</option><option value="3">明显</option><option value="4">非常明显</option></select></div>
                <div class="question"><label>📱 手机号（用于HPB积分）</label><input type="tel" id="phone" placeholder="8123 4567" required></div>
                <div class="consent-box"><div class="consent-line"><input type="checkbox" id="consentGeneral" required><label>我同意知情同意书</label></div><div class="consent-line"><input type="checkbox" id="consentRWE" required><label>我同意匿名化数据用于RWE研究</label></div></div>
                <button type="submit" class="btn">提交并生成报告</button>
                <div id="message" style="margin-top:12px;"></div>
            </form>
        </div>
    </div>

    <!-- 报告页 -->
    <div id="reportPage" style="display:none;"></div>
    <footer>© 2026 AROMA SUNÉ · 蚂蚁链存证 · 非医疗建议</footer>
</div>

<script>
    let currentLang = localStorage.getItem('aroma_lang') || 'zh';
    document.body.setAttribute('data-lang', currentLang);
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if(btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
        btn.addEventListener('click', () => {
            currentLang = btn.getAttribute('data-lang');
            document.body.setAttribute('data-lang', currentLang);
            localStorage.setItem('aroma_lang', currentLang);
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    document.getElementById('startBtn')?.addEventListener('click', () => {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('surveyPage').style.display = 'block';
    });

    function generateReport(data) {
        const psqi = data.psqi;
        const ess = data.ess;
        const isi = data.isi;
        let tendencyScores = {
            A: Math.min(10, (data.q2||0)*3 + (data.q6||0)*2),
            B: Math.min(10, (data.q7||0)*3 + (data.q8||0)),
            C: Math.min(10, (data.q18||0)*3 + (data.q17||0)),
            D: Math.min(10, (data.q19||0)*3 + (data.q10||0))
        };
        const tendencyNames = {
            A: { zh:'入睡准备期偏长', en:'Long sleep onset', ms:'Tempoh tidur panjang', id:'Waktu tidur panjang' },
            B: { zh:'夜间易醒敏感', en:'Night awakenings', ms:'Kerap bangun malam', id:'Sering terbangun' },
            C: { zh:'日间精力恢复偏慢', en:'Daytime fatigue', ms:'Letih siang hari', id:'Lelah siang hari' },
            D: { zh:'睡眠呼吸干扰风险', en:'Sleep breathing risk', ms:'Risiko pernafasan tidur', id:'Risiko napas tidur' }
        };
        let html = `<div class="report-card"><h2>📋 睡眠健康倾向报告</h2>`;
        html += `<p><strong>PSQI总分：${psqi}</strong> (0-21分，越高睡眠问题越明显)</p>`;
        html += `<p><strong>ESS嗜睡评分：${ess}</strong> (0-24分)</p>`;
        html += `<p><strong>ISI失眠严重程度：${isi}</strong> (0-28分)</p>`;
        html += `<div><strong>🔍 四种睡眠倾向分析</strong><div>`;
        for(let k of ['A','B','C','D']) {
            let name = tendencyNames[k][currentLang] || tendencyNames[k].zh;
            let stars = '⭐'.repeat(Math.ceil(tendencyScores[k]/2));
            html += `<div class="score-bar"><span>${name}</span><span>${tendencyScores[k]}/10 ${stars}</span></div>`;
        }
        html += `</div><div class="disclaimer">⚠️ 本报告仅用于健康行为参考，不构成医疗建议，不能替代医生诊断。</div>`;
        html += `<button id="backHomeBtn" class="btn" style="margin-top:16px;">← 返回首页</button>`;
        html += `<button id="redoSurveyBtn" class="btn" style="margin-top:8px;">✏️ 重新填写问卷</button></div>`;
        document.getElementById('reportPage').innerHTML = html;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('surveyPage').style.display = 'none';
        document.getElementById('reportPage').style.display = 'block';
        document.getElementById('backHomeBtn')?.addEventListener('click', () => location.reload());
        document.getElementById('redoSurveyBtn')?.addEventListener('click', () => {
            document.getElementById('surveyPage').style.display = 'block';
            document.getElementById('reportPage').style.display = 'none';
        });
    }

    document.getElementById('sleepForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        if(!document.getElementById('consentGeneral').checked || !document.getElementById('consentRWE').checked) {
            document.getElementById('message').innerText = '请勾选所有同意选项';
            return;
        }
        const phone = document.getElementById('phone').value.trim();
        if(!phone) {
            document.getElementById('message').innerText = '请输入手机号';
            return;
        }
        let psqi = 0;
        for(let i=2;i<=16;i++) if(i!==15) psqi += parseInt(document.getElementById(`q${i}`)?.value)||0;
        const ess = (parseInt(document.getElementById('ess1')?.value)||0)+(parseInt(document.getElementById('ess2')?.value)||0);
        let isi = 0;
        for(let i=1;i<=7;i++) isi += parseInt(document.getElementById(`isi${i}`)?.value)||0;
        const reportData = {
            psqi, ess, isi,
            q2: parseInt(document.getElementById('q2')?.value)||0,
            q6: parseInt(document.getElementById('q6')?.value)||0,
            q7: parseInt(document.getElementById('q7')?.value)||0,
            q8: parseInt(document.getElementById('q8')?.value)||0,
            q10: parseInt(document.getElementById('q10')?.value)||0,
            q17: parseInt(document.getElementById('q17')?.value)||0,
            q18: parseInt(document.getElementById('q18')?.value)||0,
            q19: parseInt(document.getElementById('q19')?.value)||0
        };
        generateReport(reportData);
        // 模拟后端保存提示
        document.getElementById('message').innerText = '✅ 报告已生成（数据未上传，仅本地演示）';
    });
</script>
</body>
</html>
