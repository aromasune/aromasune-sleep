    function computePSQI(resp) {
        try {
            let qualityMap = { '很好':0, '较好':1, '较差':2, '很差':3 };
            let c1 = qualityMap[resp.sleep_quality] || 1;
            let latency = parseInt(resp.q_latency_min) || 0;
            let c2 = latency <= 15 ? 0 : (latency <= 30 ? 1 : (latency <= 60 ? 2 : 3));
            let hours = parseFloat(resp.q_sleep_hours) || 0;
            let c3 = hours >= 7 ? 0 : (hours >= 6 ? 1 : (hours >= 5 ? 2 : 3));
            let c4 = 0;
            if (resp.q_bedtime && resp.q_waketime) {
                let [bh, bm] = resp.q_bedtime.split(':').map(Number);
                let [wh, wm] = resp.q_waketime.split(':').map(Number);
                let inBed = (wh * 60 + wm) - (bh * 60 + bm);
                if (inBed < 0) inBed += 1440;
                let eff = (hours * 60 / inBed) * 100;
                if (eff >= 85) c4 = 0;
                else if (eff >= 75) c4 = 1;
                else if (eff >= 65) c4 = 2;
                else c4 = 3;
            } else {
                let e = resp.q_efficiency;
                if (e === '>85%') c4 = 0;
                else if (e === '75%-84%') c4 = 1;
                else if (e === '65%-74%') c4 = 2;
                else c4 = 3;
            }
            let freqMap = { '无':0, '<1次/周':1, '1-2次/周':2, '≥3次/周':3 };
            let diff = freqMap[resp.q_difficulty_sleep] || 0;
            let wake = freqMap[resp.q_wake_night] || 0;
            let c5 = Math.min(3, Math.floor((diff + wake) / 2));
            let c6 = freqMap[resp.q_meds] || 0;
            let c7 = freqMap[resp.q_day_dys] || 0;
            return Math.min(21, c1 + c2 + c3 + c4 + c5 + c6 + c7);
        } catch (e) { return 10; }
    }
    function computeESS(resp) {
        let map = { '从不':0, '很少':1, '有时':2, '经常':3 };
        let keys = ['ess_read', 'ess_afternoon', 'ess_tv', 'ess_public', 'ess_car', 'ess_afternoon_rest', 'ess_talk', 'ess_lunch', 'ess_traffic'];
        return keys.reduce((s, k) => s + (map[resp[k]] || 0), 0);
    }

        let map = { '无':0, '轻度':1, '中度':2, '重度':3, '极重度':4, '非常满意':0, '满意':1, '一般':2, '不满意':3, '非常不满意':4, '轻微':1, '中等':2, '很大':3, '极严重':4 };
