<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Emotional Release Audio · AROMA SUNÉ™</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #fefef7;
      color: #2c3e2f;
      line-height: 1.5;
      padding: 2rem 1.5rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #e9ede4;
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lang-btn {
      background: none;
      border: 1px solid #d4c5b0;
      padding: 4px 12px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .lang-btn.active { background: #b99470; border-color: #b99470; color: white; }

    h1 { font-size: 1.6rem; font-weight: 500; color: #3c5e30; margin-bottom: 0.4rem; }
    .subhead {
      color: #6b7c5e;
      border-left: 3px solid #b99470;
      padding-left: 12px;
      margin: 10px 0 18px;
      font-size: 0.9rem;
    }
    .note {
      background: #f9f3ec;
      padding: 1rem;
      border-radius: 20px;
      margin: 1.2rem 0;
      font-size: 0.85rem;
      border: 1px solid #e2e8da;
      color: #8a4a00;
    }
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 760px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
    .card {
      border: 1px solid #e9ede4;
      border-radius: 22px;
      padding: 14px;
      background: #fff;
    }
    .card h2 { font-size: 1.05rem; font-weight: 600; color: #4a6a3b; margin-bottom: 8px; }
    .card p { color: #5a6b52; margin-bottom: 10px; font-size: 0.9rem; }
    audio { width: 100%; margin-top: 6px; }
    .meta { margin-top: 8px; font-size: 0.75rem; color: #8b9a7a; }

    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 16px;
      border: 1px solid #d4c5b0;
      background: #fff;
      color: #2c3e2f;
      text-decoration: none;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn:hover { border-color: #b99470; }

    .footer-note { font-size: 0.7rem; text-align: center; margin-top: 2rem; color: #8b9a7a; }
  </style>
</head>

<body>
  <div class="container">
    <div class="top">
      <div>
        <h1 id="title">Emotional Release Audio</h1>
        <div class="subhead" id="subhead">3 free audio guides · choose one and press play</div>
      </div>
      <div class="lang-bar" id="langBar"></div>
    </div>

    <div class="note" id="note"></div>

    <div class="grid">
      <div class="card">
        <h2 id="t1"></h2>
        <p id="d1"></p>
        <audio id="a1" controls preload="metadata"></audio>
        <div class="meta" id="m1"></div>
      </div>

      <div class="card">
        <h2 id="t2"></h2>
        <p id="d2"></p>
        <audio id="a2" controls preload="metadata"></audio>
        <div class="meta" id="m2"></div>
      </div>

      <div class="card">
        <h2 id="t3"></h2>
        <p id="d3"></p>
        <audio id="a3" controls preload="metadata"></audio>
        <div class="meta" id="m3"></div>
      </div>
    </div>

    <div class="actions">
      <a class="btn" href="./sleep_guide.html" id="backBtn">← Back to Sleep Guide</a>
      <button class="btn" id="stopBtn" type="button">Stop all</button>
    </div>

    <div class="footer-note" id="footerNote">AROMA SUNÉ™ · quietly part of WTA · WSS · WITT AP</div>
  </div>

<script>
  let currentLang = "en";

  function getLangFromQuery() {
    const p = new URLSearchParams(window.location.search);
    const l = (p.get("lang") || "").toLowerCase();
    return ["en","zh","ms","id"].includes(l) ? l : null;
  }

  // ✅ 音频文件路径：默认 audio/<lang>/<file>.mp3
  // 如你的文件名不同，只改这里即可
  const audioPaths = {
    en: { a1: "./audio/en/conflict.mp3", a2: "./audio/en/parenting.mp3", a3: "./audio/en/aging.mp3" },
    zh: { a1: "./audio/zh/conflict.mp3", a2: "./audio/zh/parenting.mp3", a3: "./audio/zh/aging.mp3" },
    ms: { a1: "./audio/ms/conflict.mp3", a2: "./audio/ms/parenting.mp3", a3: "./audio/ms/aging.mp3" },
    id: { a1: "./audio/id/conflict.mp3", a2: "./audio/id/parenting.mp3", a3: "./audio/id/aging.mp3" },
  };

  const translations = {
    en: {
      pageTitle: "Emotional Release Audio · AROMA SUNÉ™",
      title: "Emotional Release Audio",
      subhead: "3 free audio guides · choose one and press play",
      note: "Tip: If emotions feel intense, take 3 slow breaths (inhale 4s / exhale 6s) before pressing play. This is educational support, not medical advice.",
      cards: [
        { t: "1) After-Conflict Repair", d: "For calming down after a conflict and restoring a sense of safety and connection." },
        { t: "2) Parenting Stress Release", d: "For caregiver fatigue, guilt, and tension release. Suitable for a break or before sleep." },
        { t: "3) Aging-Anxiety Relief", d: "For worries about aging, health uncertainty, and the future—grounding and settling practice." },
      ],
      meta: "Length: ~15–20 min (depends on the file)",
      back: "← Back to Sleep Guide",
      stop: "Stop all",
      footer: "AROMA SUNÉ™ · quietly part of WTA · WSS · WITT AP"
    },
    zh: {
      pageTitle: "情绪释放音频 · AROMA SUNÉ™",
      title: "情绪释放音频",
      subhead: "三段免费音频 · 选择一段并点击播放",
      note: "使用提示：如果你正在强烈情绪中，先做 3 次缓慢深呼吸（吸气 4 秒 / 呼气 6 秒）再播放。本页为教育支持，不构成医疗建议。",
      cards: [
        { t: "① 争吵后修复", d: "用于冲突后情绪回落、恢复安全感与连接感。" },
        { t: "② 育儿压力释放", d: "用于照护疲劳、内疚与紧绷感的释放，适合休息或睡前。" },
        { t: "③ 衰老焦虑缓解", d: "用于面对衰老、健康不确定性与未来担忧时的安定练习。" },
      ],
      meta: "时长：约 15–20 分钟（以实际文件为准）",
      back: "← 返回睡眠指南",
      stop: "全部停止",
      footer: "AROMA SUNÉ™ · 安静地 part of WTA · WSS · WITT AP"
    },
    ms: {
      pageTitle: "Audio Pelepasan Emosi · AROMA SUNÉ™",
      title: "Audio Pelepasan Emosi",
      subhead: "3 audio percuma · pilih satu dan tekan main",
      note: "Tip: Jika emosi terasa kuat, ambil 3 nafas perlahan (tarik 4s / hembus 6s) sebelum tekan main. Ini sokongan pendidikan, bukan nasihat perubatan.",
      cards: [
        { t: "1) Pulih Selepas Pertengkaran", d: "Untuk menenangkan diri selepas konflik dan memulihkan rasa selamat serta hubungan." },
        { t: "2) Lepas Tekanan Keibubapaan", d: "Untuk keletihan penjagaan, rasa bersalah, dan ketegangan. Sesuai semasa rehat atau sebelum tidur." },
        { t: "3) Redakan Kebimbangan Penuaan", d: "Untuk kebimbangan tentang penuaan, ketidakpastian kesihatan, dan masa depan—latihan menstabilkan diri." },
      ],
      meta: "Tempoh: ~15–20 min (bergantung pada fail)",
      back: "← Kembali ke Panduan Tidur",
      stop: "Hentikan semua",
      footer: "AROMA SUNÉ™ · quietly part of WTA · WSS · WITT AP"
    },
    id: {
      pageTitle: "Audio Pelepasan Emosi · AROMA SUNÉ™",
      title: "Audio Pelepasan Emosi",
      subhead: "3 audio gratis · pilih satu dan tekan putar",
      note: "Tips: Jika emosi terasa kuat, ambil 3 napas pelan (tarik 4 dtk / hembus 6 dtk) sebelum menekan putar. Ini dukungan edukasi, bukan nasihat medis.",
      cards: [
        { t: "1) Pulih Setelah Pertengkaran", d: "Untuk menurunkan emosi setelah konflik dan memulihkan rasa aman serta koneksi." },
        { t: "2) Lepas Stres Pengasuhan", d: "Untuk kelelahan mengasuh, rasa bersalah, dan tegang. Cocok saat istirahat atau sebelum tidur." },
        { t: "3) Redakan Cemas Tentang Penuaan", d: "Untuk kekhawatiran tentang penuaan, ketidakpastian kesehatan, dan masa depan—latihan menenangkan diri." },
      ],
      meta: "Durasi: ~15–20 menit (tergantung file)",
      back: "← Kembali ke Panduan Tidur",
      stop: "Hentikan semua",
      footer: "AROMA SUNÉ™ · quietly part of WTA · WSS · WITT AP"
    }
  };

  function pauseAll() {
    ["a1","a2","a3"].forEach(id => {
      const el = document.getElementById(id);
      el.pause();
      el.currentTime = 0;
    });
  }

  function applyLanguage() {
    const tr = translations[currentLang] || translations.en;

    document.documentElement.lang =
      currentLang === "zh" ? "zh-CN" :
      currentLang === "ms" ? "ms" :
      currentLang === "id" ? "id" : "en";

    document.title = tr.pageTitle;

    document.getElementById("title").innerText = tr.title;
    document.getElementById("subhead").innerText = tr.subhead;
    document.getElementById("note").innerText = tr.note;

    document.getElementById("t1").innerText = tr.cards[0].t;
    document.getElementById("d1").innerText = tr.cards[0].d;
    document.getElementById("t2").innerText = tr.cards[1].t;
    document.getElementById("d2").innerText = tr.cards[1].d;
    document.getElementById("t3").innerText = tr.cards[2].t;
    document.getElementById("d3").innerText = tr.cards[2].d;

    document.getElementById("m1").innerText = tr.meta;
    document.getElementById("m2").innerText = tr.meta;
    document.getElementById("m3").innerText = tr.meta;

    // ✅ 返回按钮：带回语言参数
    document.getElementById("backBtn").innerText = tr.back;
    document.getElementById("backBtn").href = `./sleep_guide.html?lang=${currentLang}`;

    document.getElementById("stopBtn").innerText = tr.stop;
    document.getElementById("footerNote").innerText = tr.footer;

    // 切换语言时重置音频
    pauseAll();

    const paths = audioPaths[currentLang] || audioPaths.en;
    document.getElementById("a1").src = paths.a1;
    document.getElementById("a2").src = paths.a2;
    document.getElementById("a3").src = paths.a3;

    document.getElementById("a1").load();
    document.getElementById("a2").load();
    document.getElementById("a3").load();

    document.querySelectorAll(".lang-btn")
      .forEach(btn => btn.classList.toggle("active", btn.dataset.lang === currentLang));
  }

  function setLanguage(lang) {
    currentLang = lang;
    applyLanguage();
  }

  function renderLangBar() {
    const langs = [
      { code: "en", name: "English" },
      { code: "zh", name: "中文" },
      { code: "ms", name: "Melayu" },
      { code: "id", name: "Indonesia" },
    ];
    const bar = document.getElementById("langBar");
    bar.innerHTML = langs.map(l =>
      `<button class="lang-btn" data-lang="${l.code}" onclick="setLanguage('${l.code}')">${l.name}</button>`
    ).join("");
  }

  window.onload = () => {
    renderLangBar();
    const qLang = getLangFromQuery();
    if (qLang) currentLang = qLang;
    applyLanguage();
    document.getElementById("stopBtn").addEventListener("click", pauseAll);
  };
</script>
</body>
</html>
