<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AROMA SUNÉ CORS 诊断</title>
</head>
<body>
    <h3>AROMA SUNÉ CORS 诊断</h3>
    <p>后端地址：<span id="apiUrlDisplay"></span></p>
    <button onclick="testSendCode()">1. 测试发送验证码 (sendCode)</button>
    <button onclick="testVerify()">2. 测试登录验证 (verify)</button>
    <pre id="result" style="background:#f0f0f0; padding:10px; margin-top:20px;">点击按钮后结果将显示在这里...</pre>

    <script>
        // ⚠️ 请将这里替换为你的真实后端 Web App URL（以 /exec 结尾）
        const API_BASE = “https://cors-anywhere.herokuapp.com/https://script.google.com/macros/s/AKfycbzkWtxV6v0OIWE9tXXM-xPWSX3GpGOtmt6Isd5oaKQvngvs33d1Q7k0c_Q5dGBDdBgG/exec”；
        
        document.getElementById('apiUrlDisplay').innerText = API_BASE;
        
        async function testSendCode() {
            const url = API_BASE + "?action=sendCode&phone=12345678";
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "请求中: " + url + "\n\n";
            try {
                const res = await fetch(url);
                const text = await res.text();
                resultDiv.innerText += "✅ 响应状态: " + res.status + "\n";
                resultDiv.innerText += "✅ 响应内容: " + text;
            } catch (err) {
                resultDiv.innerText += "❌ 错误: " + err.message;
                console.error(err);
            }
        }
        
        async function testVerify() {
            const url = API_BASE + "?action=verify&phone=12345678&code=123456";
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "请求中: " + url + "\n\n";
            try {
                const res = await fetch(url);
                const text = await res.text();
                resultDiv.innerText += "✅ 响应状态: " + res.status + "\n";
                resultDiv.innerText += "✅ 响应内容: " + text;
            } catch (err) {
                resultDiv.innerText += "❌ 错误: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
