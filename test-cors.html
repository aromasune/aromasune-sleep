<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CORS 诊断测试</title>
</head>
<body>
    <h3>AROMA SUNÉ CORS 诊断</h3>
    <p>后端地址：<span id="apiUrlDisplay"></span></p>
    <button onclick="testSendCode()">1. 测试发送验证码 (sendCode)</button>
    <button onclick="testVerify()">2. 测试登录验证 (verify)</button>
    <pre id="result" style="background:#f0f0f0; padding:10px; margin-top:20px;">点击按钮后结果将显示在这里...</pre>

    <script>
        // 请将此 URL 替换为你最新的 Web App 地址
        const API_BASE = "https://script.google.com/macros/s/AKfycbxw_mQ_PrM0fdNVm14GFGOGqUBb8YRA1A51CQgom1Hvt91j52PRBe7Ww2FtEf3XJyMXIA/exec”；
        
        document.getElementById('apiUrlDisplay').innerText = API_BASE;
        
        async function testSendCode() {
            const url = API_BASE + "?action=sendCode&phone=12345678";
            document.getElementById('result').innerText = "请求中: " + url + "\n\n";
            try {
                const res = await fetch(url);
                const text = await res.text();
                document.getElementById('result').innerText += "✅ 响应状态: " + res.status + "\n";
                document.getElementById('result').innerText += "✅ 响应内容: " + text;
            } catch (err) {
                document.getElementById('result').innerText += "❌ 错误: " + err.message;
                console.error(err);
            }
        }
        
        async function testVerify() {
            const url = API_BASE + "?action=verify&phone=12345678&code=123456";
            document.getElementById('result').innerText = "请求中: " + url + "\n\n";
            try {
                const res = await fetch(url);
                const text = await res.text();
                document.getElementById('result').innerText += "✅ 响应状态: " + res.status + "\n";
                document.getElementById('result').innerText += "✅ 响应内容: " + text;
            } catch (err) {
                document.getElementById('result').innerText += "❌ 错误: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
