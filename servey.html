  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body { background: #fefef7; margin: 0; padding: 20px; color: #2c3e2f; }
    .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 32px; padding: 24px 20px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #e9ede4; }

    .brand-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e9ede4; }
    .logo { font-size: 1.3rem; font-weight: 500; color: #4a6a3b; letter-spacing: 1px; }
    .trust-badge { display: flex; gap: 12px; font-size: 0.7rem; color: #6b8460; flex-wrap: wrap; }

    .lang-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .lang-btn { background: none; border: 1px solid #d4c5b0; padding: 4px 12px; border-radius: 40px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
    .lang-btn.active { background: #b99470; border-color: #b99470; color: #fff; }

    h1 { font-size: 1.6rem; font-weight: 500; margin: 0 0 8px; color: #3c5e30; }
    .sub { color: #6b7c5e; border-left: 3px solid #b99470; padding-left: 12px; margin: 12px 0 24px; font-size: 0.9rem; }

    .question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
    .question label { font-weight: 500; display: block; margin-bottom: 8px; }

    select, input[type="number"], input[type="time"], input[type="tel"] {
      padding: 10px 14px;
      border-radius: 28px;
      border: 1px solid #ddd0c0;
      background: #fffaf5;
      width: 100%;
      max-width: 300px;
      font-size: 0.9rem;
    }

    button {
      background: #4a6a3b;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 1rem;
    }
    button:hover { background: #3a5a2e; }

    .consent-box { background: #f9f3ec; padding: 16px; border-radius: 20px; margin: 24px 0; font-size: 0.85rem; border: 1px solid #e2e8da; }
    .consent-box a { color: #4a6a3b; }

    .report { background-color: #f8f8f4; padding: 1.8rem; border-radius: 24px; margin-top: 2rem; border-left: 4px solid #b99470; }
    .hide { display: none; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2c3e2f; color: #fff; padding: 10px 20px; border-radius: 40px;
      font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .footer-note { font-size: 0.7rem; text-align: center; margin-top: 32px; color: #8b9a7a; border-top: 1px solid #e2e8da; padding-top: 20px; }
    .inline-link { color: #6b8460; text-decoration: none; margin: 0 6px; }

    @media (max-width: 600px) {
      .container { padding: 20px 16px; }
      .brand-bar { flex-direction: column; align-items: start; gap: 8px; }
    }
  </style>
</head>

      </div>

          <option value="1">16–30 min</option>
          <option value="2">31–60 min</option>
          <option value="3">&gt;60 min</option>
        </select>
      </div>

      <div class="question">
        <label id="q3_label">3. Wake-up time</label>
        <input type="time" id="q3" />
      </div>

      <div class="question">
        <label id="q4_label">4. Actual sleep hours/night</label>
        <select id="q4">
          <option value="">Please select</option>
          <option value="0">&gt;7 hours</option>
          <option value="1">6–7 hours</option>
          <option value="2">5–6 hours</option>
          <option value="3">&lt;5 hours</option>
        </select>
      </div>

      <div class="question">
        <label id="q5_label">5. Overall sleep quality</label>
        <select id="q5">
          <option value="">Please select</option>
          <option value="0">Very good</option>
          <option value="1">Fairly good</option>
          <option value="2">Poor</option>
          <option value="3">Very poor</option>
        </select>
      </div>

      <div class="question">
        <label id="q6_label">6. Sleep medication frequency</label>
        <select id="q6">
          <option value="">Please select</option>
          <option value="0">Never</option>
          <option value="1">&lt;1/week</option>
          <option value="2">1-2/week</option>
          <option value="3">≥3/week</option>
        </select>
      </div>

      <div class="question">
        <label id="q7_label">7. Trouble staying awake (driving/eating/social)</label>
        <select id="q7">
          <option value="">Please select</option>
          <option value="0">Never</option>
          <option value="1">&lt;1/week</option>
          <option value="2">1-2/week</option>
          <option value="3">≥3/week</option>
        </select>
      </div>

      <div class="question">
        <label id="q8_label">8. Difficulty keeping up enthusiasm</label>
        <select id="q8">
          <option value="">Please select</option>
          <option value="0">None</option>
          <option value="1">Mild</option>
          <option value="2">Moderate</option>
          <option value="3">Severe</option>
        </select>
      </div>

      <div class="question">
        <label id="q9_label">9. Sleep problem noticed by others</label>
        <select id="q9">
          <option value="">Please select</option>
          <option value="0">Not noticed</option>
          <option value="1">Mildly</option>
          <option value="2">Somewhat</option>
          <option value="3">Very much</option>
        </select>
      </div>

      <div class="question">
        <label id="phone_label">📱 Phone (optional, to receive report)</label>
        <input type="tel" id="phone" placeholder="+65 8123 4567" />
      </div>

      <div class="consent-box">
        <label>
          <input type="checkbox" id="consent" />
          <span id="consent_label"></span>
        </label>
      </div>

        <label>
          <input type="checkbox" id="donateIntent" />
          <span id="donateLabel"></span>
        </label>
      </div>

      <button id="submitBtn"></button>
    </div>

        consentHtml: `Saya menyetujui pelacakan tidur anonim untuk perbaikan layanan. Data disimpan di Airtable (AS). Saya dapat meminta penghapusan melalui <a href="mailto:privacy@aromasune.com">privacy@aromasune.com</a>.`,
        donateLabel: "🌱 Saya ingin menyumbangkan 10 poin yang saya peroleh dari survei ini untuk proyek kesehatan komunitas.",
        btn: "🌱 Lihat laporan dengan tenang",
        back: "← Kembali ke survei",

        reportTitle: "🌙 Laporan Tidur Anda",
        reportThanks: "Terima kasih telah membagikan ritme tidur Anda dengan lembut.",
        reportScoreLabel: "Total Skor PSQI Anda",
        reportScaleTitle: "Panduan skor",
        reportScaleHtml:
          "▸ 0–5: Ritme tidur umumnya stabil<br>" +
          "▸ 6–10: Ada fluktuasi; perhatian lembut sudah cukup<br>" +
          "▸ 11–15: Tidur mungkin membawa stres<br>" +
          "▸ 16–21: Mohon lebih lembut pada diri sendiri",
        reportNotMedical: "Ini bukan diagnosis medis — hanya cara untuk menyadari ritme Anda.",
        reportGuideLinkText: "Lihat Panduan Kesehatan Tidur",
        reportWithdraw: "Untuk menarik atau menghapus data, email",
        pointsLineDonateOn: "🌱 Anda memperoleh 10 poin dari pengisian ini. Terima kasih telah mendonasikannya untuk proyek kesehatan komunitas.",
        pointsLineDonateOff: "🌱 Anda memperoleh 10 poin dari pengisian ini. Anda dapat memilih untuk berdonasi lain kali.",
        pointsNote: "10 poin adalah kredit partisipasi internal AROMA SUNÉ (bukan HPB Healthpoints, uang tunai, atau kripto).",
        donationNote: DONATION_RULE_TEXT_ID,

        toastNeedConsent: "Silakan centang persetujuan pengumpulan data terlebih dahulu",
        toastNeedComplete: "Silakan lengkapi semua pertanyaan tidur",

        privacyAlertTitle:
          "Pengumpulan data mengikuti PDPA Singapura. Disimpan di Airtable (AS). DPO: privacy@aromasune.com. Masa simpan: 24 bulan. Anda bisa meminta penghapusan kapan saja.",
        privacyAlertDonation:
          "Kredit partisipasi & donasi: Setiap penilaian mencatat 10 kredit partisipasi AROMA SUNÉ (kredit internal; bukan HPB Healthpoints, uang tunai, atau kripto). Jika Anda memilih berdonasi, AROMA SUNÉ akan berdonasi uang berdasarkan total kredit (10 kredit = setara donasi SGD $1), diselesaikan bulanan, dibatasi SGD $300/bulan.",

        options: {
          q2: ["≤15 menit","16–30 menit","31–60 menit",">60 menit"],
          q4: [">7 jam","6–7 jam","5–6 jam","<5 jam"],
          q5: ["Sangat baik","Cukup baik","Buruk","Sangat buruk"],
          q6: ["Tidak pernah","<1/minggu","1-2/minggu","≥3/minggu"],
          q7: ["Tidak pernah","<1/minggu","1-2/minggu","≥3/minggu"],
          q8: ["Tidak ada","Ringan","Sedang","Berat"],
          q9: ["Tidak terlihat","Sedikit","Cukup","Sangat jelas"]
        },

        interpretation: [
          "Ritme tidur umumnya stabil.",
          "Ada fluktuasi; perhatian lembut sudah cukup.",
          "Tidur mungkin membawa stres.",
          "Mohon lebih lembut pada diri sendiri."
        ]
      }
    };

    function t(key, optQ, optIdx) {
      if (optQ !== undefined) return translations[currentLang]?.options?.[optQ]?.[optIdx] || "";
      return translations[currentLang]?.[key] || translations.en[key] || key;
    }

    function showToast(msg, isErr = false) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.background = isErr ? "#b91c1c" : "#2c3e2f";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function calculatePSQI() {
      let total = 0;
      total += parseInt(document.getElementById("q2").value) || 0;
      total += parseInt(document.getElementById("q4").value) || 0;
      total += parseInt(document.getElementById("q5").value) || 0;
      total += parseInt(document.getElementById("q6").value) || 0;
      total += parseInt(document.getElementById("q7").value) || 0;
      total += parseInt(document.getElementById("q8").value) || 0;
      total += parseInt(document.getElementById("q9").value) || 0;
      return Math.min(21, total);
    }

    function getInterpretation(score) {
      const arr = translations[currentLang]?.interpretation || translations.en.interpretation;
      if (score <= 5) return arr[0];
      if (score <= 10) return arr[1];
      if (score <= 15) return arr[2];
      return arr[3];
    }

    // ✅ 关键：报告渲染函数（切换语言时可重复调用）
    function renderReport(score, donateOn) {
      const guideLink = "/sleep_guide.html";
      const interpretation = getInterpretation(score);
      const pointsLine = donateOn ? t("pointsLineDonateOn") : t("pointsLineDonateOff");

      const reportHtml = `
        <p>${t("reportThanks")}</p>
        <p><strong>${t("reportScoreLabel")}: ${score} / 21</strong></p>
        <p><strong>${t("reportScaleTitle")}:</strong><br>${t("reportScaleHtml")}</p>
        <p>${interpretation}</p>
        <p>${t("reportNotMedical")}</p>
        <p>📘 <a href="${guideLink}" target="_blank" rel="noopener">${t("reportGuideLinkText")}</a></p>

        <p>${pointsLine}</p>
        <p style="font-size:0.85rem; color:#6b7c5e;">${t("pointsNote")}</p>
        <p style="font-size:0.85rem; color:#6b7c5e;">${t("donationNote")}</p>

        <p>${t("reportWithdraw")} <a href="mailto:privacy@aromasune.com">privacy@aromasune.com</a>.</p>
        <hr>
        <footer style="font-size:0.7rem;">quietly part of WTA wellness ecosystem · connected to WSS · WITT AP</footer>
      `;

      document.getElementById("reportContent").innerHTML = reportHtml;
    }

    function sha256Hex(str) {
      const buffer = new TextEncoder().encode(str);
      return crypto.subtle.digest("SHA-256", buffer).then(hash => {
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, "0")).join("");
      });
    }

    async function logToBackend(payload) {
      if (!BACKEND_PROXY) { console.warn("BACKEND_PROXY not configured", payload); return; }
      try {
        const response = await fetch(BACKEND_PROXY, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: API_SECRET, data: payload })
        });
        const result = await response.json();
        console.log("Saved:", result);
      } catch (err) {
        console.error("Logging failed:", err);
      }
    }

    async function onSubmit() {
      if (!document.getElementById("consent").checked) {
        return showToast(t("toastNeedConsent"), true);
      }

      const required = ["q2","q4","q5","q6","q7","q8","q9"];
      for (let id of required) {
        if (!document.getElementById(id).value) return showToast(t("toastNeedComplete"), true);
      }

      const phoneRaw = document.getElementById("phone").value.trim();
      let phoneHash = "";
      if (phoneRaw) phoneHash = await sha256Hex(phoneRaw);
      else phoneHash = await sha256Hex(String(Date.now()) + Math.random().toString());

      const payload = {
        phoneHash,
        age: document.getElementById("age").value,
        meno: document.getElementById("meno").value,
        q1: document.getElementById("q1").value,
        q2: document.getElementById("q2").value,
        q3: document.getElementById("q3").value,
        q4: document.getElementById("q4").value,
        q5: document.getElementById("q5").value,
        q6: document.getElementById("q6").value,
        q7: document.getElementById("q7").value,
        q8: document.getElementById("q8").value,
        q9: document.getElementById("q9").value,
        psqi_total: calculatePSQI(),
        language: currentLang,
        timestamp: new Date().toISOString(),
        donate_intent: document.getElementById("donateIntent").checked
      };

      await logToBackend(payload);

      const score = payload.psqi_total;
      const donateOn = payload.donate_intent;

      // ✅ 缓存报告结果
      lastReport = { score, donateOn };

      // ✅ 用当前语言渲染报告
      renderReport(score, donateOn);

      document.getElementById("formSection").classList.add("hide");
      document.getElementById("reportSection").classList.remove("hide");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetForm() {
      lastReport = null;
      document.getElementById("formSection").classList.remove("hide");
      document.getElementById("reportSection").classList.add("hide");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function applyLanguage() {
      document.getElementById("title").innerText = t("title");
      document.getElementById("subtitle").innerText = t("subtitle");

      document.getElementById("q_age_label").innerText = t("age");
      document.getElementById("q_meno_label").innerText = t("meno");

      for (let i = 1; i <= 9; i++) document.getElementById(`q${i}_label`).innerText = t(`q${i}`);

      document.getElementById("phone_label").innerHTML = t("phone");
      document.getElementById("consent_label").innerHTML = t("consentHtml");
      document.getElementById("donateLabel").innerHTML = t("donateLabel");

      document.getElementById("submitBtn").innerText = t("btn");
      document.getElementById("backBtn2").innerText = t("back");
      document.getElementById("reportTitle").innerText = t("reportTitle");

      const menoSelect = document.getElementById("meno");
      if (menoSelect && menoSelect.options.length === 3) {
        menoSelect.options[0].text = t("pre");
        menoSelect.options[1].text = t("peri");
        menoSelect.options[2].text = t("post");
      }

      for (let q of ["q2","q4","q5","q6","q7","q8","q9"]) {
        const sel = document.getElementById(q);
        if (sel && sel.options.length === 5) {
          for (let i = 1; i <= 4; i++) sel.options[i].text = t(null, q, i-1);
        }
      }

      document.title = translations[currentLang]?.pageTitle || translations.en.pageTitle;
      document.documentElement.lang =
        currentLang === "zh" ? "zh-CN" :
        currentLang === "ms" ? "ms" :
        currentLang === "id" ? "id" : "en";

      // ✅ 如果报告页正在显示：切换语言时重渲染报告正文
      const reportVisible = !document.getElementById("reportSection").classList.contains("hide");
      if (reportVisible && lastReport) {
        renderReport(lastReport.score, lastReport.donateOn);
      }
    }

    function setLanguage(lang) {
      currentLang = lang;
      applyLanguage();
      document.querySelectorAll(".lang-btn")
        .forEach(btn => btn.classList.toggle("active", btn.dataset.lang === lang));
    }

    function renderLangBar() {
      const langs = [
        { code: "en", name: "English" },
        { code: "zh", name: "中文" },
        { code: "ms", name: "Melayu" },
        { code: "id", name: "Indonesia" }
      ];
      const bar = document.getElementById("langBar");
      bar.innerHTML = langs
        .map(l => `<button class="lang-btn ${currentLang === l.code ? "active" : ""}" data-lang="${l.code}" onclick="setLanguage('${l.code}')">${l.name}</button>`)
        .join("");
    }

    window.onload = () => {
      renderLangBar();
      applyLanguage();
      document.getElementById("submitBtn").onclick = onSubmit;
      window.resetForm = resetForm;

      document.getElementById("privacyPolicyLink").addEventListener("click", (e) => {
        e.preventDefault();
        alert(t("privacyAlertTitle") + "\n\n" + t("privacyAlertDonation"));
      });
    };
  </script>
</body>
</html>
