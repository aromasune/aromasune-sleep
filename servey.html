		.container {

		.sub {
			color: #6b7c5e; border-left: 3px solid #b99470; padding-left: 12px;
			margin: 12px 0 24px; font-size: 0.9rem;
		}

		.question { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee6dc; }
		.question label { font-weight: 500; display: block; margin-bottom: 8px; }

		select, input[type="number"], input[type="time"], input[type="tel"] {
			padding: 10px 14px; border-radius: 28px; border: 1px solid #ddd0c0;
			background: #fffaf5; width: 100%; max-width: 340px; font-size: 0.9rem;

			background: #4a6a3b; border: none; padding: 12px 28px; border-radius: 40px;

		}
		button:hover { background: #3a5a2e; }
		button:disabled { opacity: 0.6; cursor: not-allowed; }

		.consent-box {
			background: #f9f3ec; padding: 16px; border-radius: 20px; margin: 24px 0;
			font-size: 0.85rem; border: 1px solid #e2e8da;
		}
		.consent-box a { color: #4a6a3b; }

		.report {
			background-color: #f8f8f4; padding: 1.8rem; border-radius: 24px; margin-top: 2rem;
			border-left: 4px solid #b99470;
		}
		.hide { display: none; }

		.toast {
			position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
			background: #2c3e2f; color: white; padding: 10px 20px; border-radius: 40px;
			font-size: 14px; z-index: 1100; opacity: 0; transition: opacity 0.3s;
			pointer-events: none;
		}
		.toast.show { opacity: 1; }

		.footer-note {
			font-size: 0.7rem; text-align: center; margin-top: 32px; color: #8b9a7a;
			border-top: 1px solid #e2e8da; padding-top: 20px;
		}
		.inline-link { color: #6b8460; text-decoration: none; margin: 0 6px; }

		/* ===== Modal ===== */
		.modal {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(0,0,0,0.55);
			z-index: 1200;
			align-items: center;
			justify-content: center;
			padding: 18px;

		.modal.open { display: flex; }
		.modal-content {
			width: min(760px, 100%);
			background: #ffffff;
			border-radius: 28px;
			border: 1px solid #e9ede4;
			box-shadow: 0 18px 60px rgba(0,0,0,0.22);
			padding: 18px 18px 14px;
			position: relative;
			max-height: min(78vh, 720px);
			overflow: auto;
		}
		.modal-header {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
			padding-bottom: 10px;
			border-bottom: 1px solid #eef1ea;
			margin-bottom: 12px;
		}
		.modal-title {
			font-size: 1.05rem;
			font-weight: 650;
			color: #2c4a2a;
			margin: 0;
		}
		.modal-close {
			border: none;
			background: transparent;
			font-size: 1.6rem;
			line-height: 1;
			cursor: pointer;
			color: #7b8a6c;
			padding: 6px 10px;
			border-radius: 12px;

		.modal-body { font-size: 0.9rem; color: #2c3e2f; line-height: 1.55; }

		.modal-note { font-size: 0.78rem; color: #6b7c5e; margin-top: 10px; }

			.container { padding: 20px 16px; }

</head>

		<div class="brand-bar">
			<div class="logo">AROMA SUNÉ</div>

				<span>🔗 19项区块链存证</span>
				<span>🏨 HPB商户(申请中)</span>
			</div>
		</div>

		<div class="lang-bar" id="langBar"></div>

		<div id="formSection">

			<div class="sub" id="subtitle">PSQI 自评 · 仅供自我节奏观察 · 非医疗诊断</div>

			<div class="question">

				<input type="number" id="age" placeholder="例如：52" step="1" />
			</div>

			<div class="question">
				<label id="q_meno_label">绝经状态</label>

					<option value="pre">未绝经</option>
					<option value="peri">围绝经期</option>
					<option value="post">已绝经</option>
				</select>
			</div>

			<div class="question">
				<label id="q1_label">1. 过去一个月，通常几点上床睡觉？</label>
				<input type="time" id="q1" />
			</div>

			<div class="question">
				<label id="q2_label">2. 过去一个月，通常上床后多久能睡着？</label>
				<select id="q2">
					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">≤15分钟</option>
					<option value="1">16–30分钟</option>
					<option value="2">31–60分钟</option>
					<option value="3">&gt;60分钟</option>
				</select>
			</div>

			<div class="question">
				<label id="q3_label">3. 过去一个月，通常早上几点起床？</label>
				<input type="time" id="q3" />
			</div>

			<div class="question">
				<label id="q4_label">4. 过去一个月，每晚实际睡眠多少小时？</label>

					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">&gt;7小时</option>
					<option value="1">6–7小时</option>
					<option value="2">5–6小时</option>
					<option value="3">&lt;5小时</option>
				</select>
			</div>

			<div class="question">
				<label id="q5_label">5. 过去一个月，整体睡眠质量如何？</label>
				<select id="q5">
					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">非常好</option>
					<option value="1">较好</option>
					<option value="2">较差</option>
					<option value="3">很差</option>
				</select>
			</div>

			<div class="question">
				<label id="q6_label">6. 过去一个月，使用助眠药物的频率？</label>
				<select id="q6">
					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">从不</option>
					<option value="1">每周&lt;1次</option>
					<option value="2">每周1-2次</option>
					<option value="3">每周≥3次</option>
				</select>
			</div>

			<div class="question">
				<label id="q7_label">7. 过去一个月，开车/吃饭/社交时难以保持清醒的频率？</label>

					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">从不</option>
					<option value="1">每周&lt;1次</option>
					<option value="2">每周1-2次</option>
					<option value="3">每周≥3次</option>
				</select>
			</div>

			<div class="question">
				<label id="q8_label">8. 过去一个月，要努力打起精神完成事情的困难程度？</label>
				<select id="q8">
					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">没有</option>
					<option value="1">有一点</option>
					<option value="2">较困难</option>
					<option value="3">很困难</option>
				</select>
			</div>

			<div class="question">
				<label id="q9_label">9. 过去一个月，他人是否注意到您的睡眠问题？</label>
				<select id="q9">
					<option value="" data-i18n="selectPrompt">请选择</option>
					<option value="0">未注意</option>
					<option value="1">轻微</option>
					<option value="2">有些</option>
					<option value="3">很明显</option>
				</select>
			</div>

				<label id="phone_label">📱 手机号（可选，用于接收报告）</label>
				<input type="tel" id="phone" placeholder="+65 8123 4567" />
			</div>

			<div class="consent-box">

					<input type="checkbox" id="consent" />

			</div>

			<span>🌿 quietly part of WTA · WSS · WITT AP</span>

		function tr() { return I18N[currentLang] || I18N.zh; }

		function showToast(msg, isErr = false) {
			const toast = document.getElementById("toast");
			toast.textContent = msg;
			toast.style.background = isErr ? "#b91c1c" : "#2c3e2f";
			toast.classList.add("show");
			setTimeout(() => toast.classList.remove("show"), 3000);
		}

		function calculatePSQI() {
			let total = 0;
			total += parseInt(document.getElementById("q2").value, 10) || 0;
			total += parseInt(document.getElementById("q4").value, 10) || 0;
			total += parseInt(document.getElementById("q5").value, 10) || 0;
			total += parseInt(document.getElementById("q6").value, 10) || 0;
			total += parseInt(document.getElementById("q7").value, 10) || 0;
			total += parseInt(document.getElementById("q8").value, 10) || 0;
			total += parseInt(document.getElementById("q9").value, 10) || 0;
			return Math.min(21, total);
		}

		async function logToBackend(payload) {
			if (!BACKEND_PROXY) {
				console.warn("BACKEND_PROXY not set; preview only. payload=", payload);
				return;
			}
			try {
				await fetch(BACKEND_PROXY, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify(payload)
				});
			} catch (err) {
				console.warn("log failed", err);
			}
		}

		async function onSubmit() {
			const i18n = tr();

			if (!document.getElementById("consent").checked) {
				return showToast(i18n.toastConsentRequired, true);
			}

			const required = ["q2", "q4", "q5", "q6", "q7", "q8", "q9"];
			for (const id of required) {
				if (!document.getElementById(id).value) {
					return showToast(i18n.toastFillRequired, true);
				}
			}

			const payload = {
				phone: document.getElementById("phone").value.trim(),
				age: document.getElementById("age").value || null,
				meno: document.getElementById("meno").value,
				q1: document.getElementById("q1").value || null,
				q2: document.getElementById("q2").value,
				q3: document.getElementById("q3").value || null,
				q4: document.getElementById("q4").value,
				q5: document.getElementById("q5").value,
				q6: document.getElementById("q6").value,
				q7: document.getElementById("q7").value,
				q8: document.getElementById("q8").value,
				q9: document.getElementById("q9").value,
				psqi_total: calculatePSQI(),
				timestamp: new Date().toISOString(),
				lang: currentLang
			};

			await logToBackend(payload);

			const score = payload.psqi_total;
			const interpretation = i18n.interp(score);

			const reportHtml = `
				<p>${i18n.reportThanks}</p>
				<p><strong>${i18n.reportYourScore} ${score} / 21</strong></p>
				<p>
					▸ ${i18n.scoreBand.b0}<br>
					▸ ${i18n.scoreBand.b1}<br>
					▸ ${i18n.scoreBand.b2}<br>
					▸ ${i18n.scoreBand.b3}
				</p>
				<p>${interpretation}</p>
				<p>${i18n.reportNotDiagnosis}</p>
				<p>📘 <a href="${guideLink}" target="_blank" rel="noopener">${i18n.reportViewGuide}</a></p>
				<p style="font-size:0.85rem; color:#6b7c5e;">${i18n.reportDeletion}</p>
				<hr>
				<footer style="font-size:0.7rem; color:#8b9a7a;">quietly part of WTA wellness ecosystem · connected to WSS · WITT AP</footer>
			`;

			document.getElementById("reportContent").innerHTML = reportHtml;
			document.getElementById("formSection").classList.add("hide");
			document.getElementById("reportSection").classList.remove("hide");
			window.scrollTo({ top: 0, behavior: "smooth" });
		}

		function resetForm() {
			document.getElementById("formSection").classList.remove("hide");
			document.getElementById("reportSection").classList.add("hide");
			window.scrollTo({ top: 0, behavior: "smooth" });
		}

		const modal = document.getElementById("privacyModal");
		const modalClose = document.getElementById("privacyModalClose");
		const modalTitle = document.getElementById("privacyModalTitle");
		const modalBody = document.getElementById("privacyModalBody");
		const privacyLink = document.getElementById("privacyPolicyLink");

		function openPrivacyModal() {
			const i18n = tr();
			modalTitle.textContent = i18n.privacyModalTitle || "Privacy";
			modalBody.innerHTML = i18n.privacyModalHtml || "";
			modal.classList.add("open");
			modal.setAttribute("aria-hidden", "false");
		}
		function closePrivacyModal() {
			modal.classList.remove("open");
			modal.setAttribute("aria-hidden", "true");
		}

		function applyLanguage() {
			const i18n = tr();

			document.getElementById("title").innerText = i18n.title;
			document.getElementById("subtitle").innerText = i18n.subtitle;
			document.getElementById("reportTitle").innerText = i18n.reportTitle;

			meno.options[2].text = i18n.meno.post;

			}

			document.getElementById("phone_label").innerText = i18n.phoneLabel;
			document.getElementById("phone").placeholder = i18n.phonePlaceholder;

			document.getElementById("consent_label").innerHTML = i18n.consentHtml;

			document.getElementById("submitBtn").innerText = i18n.submitBtn;
			document.getElementById("resetBtn").innerText = i18n.resetBtn;

			privacyLink.innerText = i18n.privacyPolicy;
			document.getElementById("deleteLink").innerText = i18n.deleteRequest;

			// 如果 modal 正在打开，切语言时同步更新 modal 文本
			if (modal.classList.contains("open")) {
				modalTitle.textContent = i18n.privacyModalTitle || modalTitle.textContent;
				modalBody.innerHTML = i18n.privacyModalHtml || modalBody.innerHTML;
			}
		}

		function setLanguage(lang) {
			currentLang = lang;
			applyLanguage();
			document.querySelectorAll(".lang-btn").forEach(btn => {
				btn.classList.toggle("active", btn.dataset.lang === lang);
			});
		}

		function renderLangBar() {
			const langs = [
				{ code: "zh", name: I18N.zh.langName },
				{ code: "en", name: I18N.en.langName },
				{ code: "ms", name: I18N.ms.langName },
				{ code: "id", name: I18N.id.langName }
			];

			const bar = document.getElementById("langBar");
			bar.innerHTML = langs.map(l =>
				`<button class="lang-btn ${currentLang === l.code ? "active" : ""}" data-lang="${l.code}" type="button">${l.name}</button>`
			).join("");

			bar.querySelectorAll(".lang-btn").forEach(btn => {
				btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
			});
		}

		window.addEventListener("load", () => {
			renderLangBar();
			applyLanguage();

			document.getElementById("submitBtn").addEventListener("click", onSubmit);
			document.getElementById("resetBtn").addEventListener("click", resetForm);

			privacyLink.addEventListener("click", (e) => {
				e.preventDefault();
				openPrivacyModal();
			});

			modalClose.addEventListener("click", closePrivacyModal);

			// click outside content closes
			modal.addEventListener("click", (e) => {
				if (e.target === modal) closePrivacyModal();
			});

			// ESC closes
			window.addEventListener("keydown", (e) => {
				if (e.key === "Escape" && modal.classList.contains("open")) closePrivacyModal();
			});
		});
	</script>
