<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AROMA SUNГү еҗҺз«Ҝе…ЁиҮӘеҠЁиҜҠж–ӯ</title>
</head>
<body>
    <h3>рҹ”§ еҗҺз«ҜиҝһйҖҡжҖ§иҜҠж–ӯ</h3>
    <p>еҗҺз«Ҝең°еқҖпјҡ<span id="apiUrl"></span></p>
    <button onclick="runDiagnostic()">в–¶ ејҖе§ӢиҜҠж–ӯ</button>
    <pre id="result" style="background:#1e1e1e; color:#d4d4d4; padding:16px; border-radius:8px; margin-top:20px; overflow:auto;">зӯүеҫ…иҜҠж–ӯ...</pre>

    <script>
        // иҝҷйҮҢжӣҝжҚўжҲҗдҪ жҲӘеӣҫдёӯзҡ„ең°еқҖпјҲзЎ®дҝқ /exec з»“е°ҫпјү
        const API_BASE = "https://script.google.com/macros/s/AKfycbxw_mQ_PrM0fdNVm14GFGOGqUBb8YRA1A51CQgom1Hvt91j52PRBe7Ww2FtEf3XJyMXIA/execвҖқ пјӣ
        
        document.getElementById('apiUrl').innerText = API_BASE;
        
        async function runDiagnostic() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "рҹ”Қ иҜҠж–ӯејҖе§Ӣ...\n";
            
            // жөӢиҜ• 1: зӣҙжҺҘ fetch sendCode
            resultDiv.innerText += "\nрҹ“Ў 1. жөӢиҜ• sendCode жҺҘеҸЈ...\n";
            const sendUrl = API_BASE + "?action=sendCode&phone=12345678";
            try {
                const res = await fetch(sendUrl);
                const text = await res.text();
                resultDiv.innerText += `   зҠ¶жҖҒз Ғ: ${res.status}\n`;
                if (res.status === 200) {
                    resultDiv.innerText += `   вң… е“Қеә”еҶ…е®№: ${text}\n`;
                    try {
                        const json = JSON.parse(text);
                        if (json.success && json.message.includes('123456')) {
                            resultDiv.innerText += `   вң… йӘҢиҜҒз ҒжҺҘеҸЈе®Ңе…ЁжӯЈеёёпјҒ\n`;
                        } else {
                            resultDiv.innerText += `   вҡ пёҸ е“Қеә”дёҚжҳҜйў„жңҹж јејҸ: ${text}\n`;
                        }
                    } catch(e) {
                        resultDiv.innerText += `   вқҢ е“Қеә”дёҚжҳҜжңүж•Ҳ JSON: ${text}\n`;
                    }
                } else {
                    resultDiv.innerText += `   вқҢ зҠ¶жҖҒз ҒејӮеёё: ${res.status}\n`;
                }
            } catch (err) {
                resultDiv.innerText += `   вқҢ иҜ·жұӮеӨұиҙҘ: ${err.message}\n`;
                resultDiv.innerText += `   рҹ’Ў иҝҷйҖҡеёёж„Ҹе‘ізқҖпјҡ\n`;
                resultDiv.innerText += `      1. еҗҺз«Ҝ URL ж— ж•ҲжҲ–жңӘйғЁзҪІ\n`;
                resultDiv.innerText += `      2. зҪ‘з»ңж— жі•и®ҝй—® Google Apps Script\n`;
                resultDiv.innerText += `      3. жөҸи§ҲеҷЁ/йҳІзҒ«еўҷжӢҰжҲӘдәҶи·ЁеҹҹиҜ·жұӮ\n`;
            }
            
            // жөӢиҜ• 2: жөӢиҜ• verify
            resultDiv.innerText += "\nрҹ”җ 2. жөӢиҜ• verify жҺҘеҸЈ...\n";
            const verifyUrl = API_BASE + "?action=verify&phone=12345678&code=123456";
            try {
                const res = await fetch(verifyUrl);
                const text = await res.text();
                resultDiv.innerText += `   зҠ¶жҖҒз Ғ: ${res.status}\n`;
                if (res.status === 200) {
                    resultDiv.innerText += `   вң… е“Қеә”еҶ…е®№: ${text}\n`;
                    try {
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.token) {
                            resultDiv.innerText += `   вң… зҷ»еҪ•жҺҘеҸЈе®Ңе…ЁжӯЈеёёпјҢToken е·Іиҝ”еӣһпјҒ\n`;
                        } else {
                            resultDiv.innerText += `   вҡ пёҸ е“Қеә”ж јејҸејӮеёё: ${text}\n`;
                        }
                    } catch(e) {
                        resultDiv.innerText += `   вқҢ е“Қеә”дёҚжҳҜжңүж•Ҳ JSON: ${text}\n`;
                    }
                } else {
                    resultDiv.innerText += `   вқҢ зҠ¶жҖҒз ҒејӮеёё: ${res.status}\n`;
                }
            } catch (err) {
                resultDiv.innerText += `   вқҢ иҜ·жұӮеӨұиҙҘ: ${err.message}\n`;
            }
            
            resultDiv.innerText += "\nрҹҸҒ иҜҠж–ӯе®ҢжҲҗгҖӮ\n";
            resultDiv.innerText += "рҹ“Ң еҰӮжһң sendCode жҲ– verify еӨұиҙҘпјҢиҜ·жЈҖжҹҘ Apps Script йғЁзҪІи®ҫзҪ®пјҡ\n";
            resultDiv.innerText += "   - йғЁзҪІж—¶гҖҢжү§иЎҢиә«д»ҪгҖҚеҝ…йЎ»дёәгҖҢжҲ‘гҖҚ\n";
            resultDiv.innerText += "   - гҖҢи°Ғжңүжқғи®ҝй—®гҖҚеҝ…йЎ»дёәгҖҢд»»дҪ•дәәгҖҚ\n";
            resultDiv.innerText += "   - д»Јз Ғдёӯ doGet еҝ…йЎ»еҢ…еҗ« CORS еӨҙ\n";
        }
    </script>
</body>
</html>
