<!DOCTYPE html>
<html>
<head><title>测试提交</title></head>
<body>
    <button onclick="test()">测试提交问卷</button>
    <pre id="result"></pre>
    <script>
        const API = "https://script.google.com/macros/s/AKfycbzZF9K2p1dA271aQenJPqjH29z-vtJcpkXceiR1Z0rbMoEKoLTJqQLn7fu-Hz8vXWo4eg/exec";
        async function test() {
            const payload = {
                phoneHash: "test123",
                age: 45,
                menopause: "未绝经",
                psqi_total: 10,
                ess_total: 5,
                isi_total: 8,
                points_earned: 0,
                language: "zh"
            };
            const res = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            document.getElementById('result').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
