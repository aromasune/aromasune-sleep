<!DOCTYPE html>
<html>
<head><title>测试</title></head>
<body>
    <h1>测试页面</h1>
    <button onclick="test()">点击测试</button>
    <pre id="out"></pre>
    <script>
        const API = "https://script.google.com/macros/s/AKfycbzZF9K2p1dA271aQenJPqjH29z-vtJcpkXceiR1Z0rbMoEKoLTJqQLn7fu-Hz8vXWo4eg/exec";
        async function test() {
            const url = API + "?action=verify&phone=98765432&code=123456";
            document.getElementById('out').innerText = "请求中...";
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById('out').innerText = JSON.stringify(data, null, 2);
            } catch(e) {
                document.getElementById('out').innerText = "错误: " + e.message;
            }
        }
    </script>
</body>
</html>
